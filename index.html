<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LNP · NSE OI PANEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #050810;
    --bg2:       #080d1a;
    --bg3:       #0c1220;
    --border:    #1a2540;
    --border2:   #243060;
    --text:      #c8d4f0;
    --text2:     #6a7fa8;
    --text3:     #3a4a68;
    --accent:    #4f8fff;
    --green:     #00e5a0;
    --red:       #ff4466;
    --yellow:    #ffd060;
    --orange:    #ff8c42;
    --purple:    #a855f7;
    --cyan:      #22d3ee;
    --glow-g:    0 0 12px rgba(0,229,160,0.3);
    --glow-r:    0 0 12px rgba(255,68,102,0.3);
    --glow-a:    0 0 12px rgba(79,143,255,0.25);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Scanline overlay */
  body::before {
    content:'';
    position:fixed; inset:0; pointer-events:none; z-index:9999;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  }

  /* ── HEADER ── */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky; top:0; z-index:100;
  }
  .header-left { display:flex; align-items:center; gap:14px; }
  .logo {
    font-family:'Space Mono', monospace;
    font-size:11px; font-weight:700;
    color: var(--accent);
    letter-spacing:3px;
    text-transform:uppercase;
    border: 1px solid var(--border2);
    padding: 4px 10px;
    border-radius:2px;
  }
  .header-title {
    font-size:18px; font-weight:700; letter-spacing:1px;
    color: var(--text);
  }
  .header-right { display:flex; align-items:center; gap:12px; }
  .index-tabs { display:flex; gap:5px; flex-wrap:wrap; }
  .tab {
    font-family:'Space Mono',monospace;
    font-size:10px; font-weight:700; letter-spacing:1px;
    padding: 5px 12px;
    border: 1px solid var(--border2);
    border-radius:2px;
    cursor:pointer;
    transition: all 0.15s;
    background: transparent;
    color: var(--text2);
  }
  .tab:hover { border-color:var(--accent); color:var(--text); }
  .tab.active { background:var(--accent); border-color:var(--accent); color:#050810; }
  .refresh-btn {
    font-family:'Space Mono',monospace; font-size:10px;
    padding: 5px 14px;
    border: 1px solid var(--border2);
    border-radius:2px;
    cursor:pointer;
    background: transparent;
    color: var(--text2);
    transition: all 0.15s;
    letter-spacing:1px;
  }
  .refresh-btn:hover { border-color:var(--yellow); color:var(--yellow); }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .last-update {
    font-family:'Share Tech Mono',monospace;
    font-size:10px; color:var(--text3);
  }

  /* ── LAYOUT ── */
  .main { display:grid; grid-template-columns:380px 1fr; gap:0; min-height:calc(100vh - 53px); }
  @media(max-width:900px) { .main { grid-template-columns:1fr; } }

  /* ── LEFT: COMMAND CENTER ── */
  .command {
    border-right: 1px solid var(--border);
    background: var(--bg2);
    padding: 0;
    display:flex; flex-direction:column;
  }
  .section-label {
    font-family:'Space Mono',monospace;
    font-size:9px; letter-spacing:3px; text-transform:uppercase;
    color: var(--text3);
    padding: 10px 16px 8px;
    border-bottom: 1px solid var(--border);
    display:flex; align-items:center; gap:8px;
  }
  .section-label::before {
    content:''; width:3px; height:3px;
    background:var(--accent); border-radius:50%;
    box-shadow: var(--glow-a);
  }

  /* Spot block */
  .spot-block {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
  }
  .spot-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
  .spot-value {
    font-family:'Space Mono',monospace;
    font-size:32px; font-weight:700;
    color: var(--text);
    letter-spacing:-1px;
  }
  .spot-change {
    font-family:'Space Mono',monospace;
    font-size:13px; font-weight:700;
  }
  .spot-change.up { color:var(--green); }
  .spot-change.dn { color:var(--red); }
  .spot-meta {
    font-size:11px; color:var(--text3);
    font-family:'Share Tech Mono',monospace;
  }

  /* Key metrics */
  .metrics-grid {
    display:grid; grid-template-columns:1fr 1fr;
    border-bottom: 1px solid var(--border);
  }
  .metric {
    padding: 12px 16px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .metric:nth-child(even) { border-right:none; }
  .metric-label {
    font-size:10px; color:var(--text3);
    letter-spacing:1px; text-transform:uppercase;
    font-family:'Space Mono',monospace;
    margin-bottom:5px;
  }
  .metric-value {
    font-family:'Space Mono',monospace;
    font-size:18px; font-weight:700;
  }
  .metric-sub {
    font-size:10px; color:var(--text2);
    margin-top:2px;
  }

  /* Walls */
  .walls { padding:14px 16px; border-bottom:1px solid var(--border); }
  .wall-row {
    display:flex; align-items:center; justify-content:space-between;
    padding: 8px 12px;
    border-radius:3px;
    margin-bottom:8px;
  }
  .wall-row.ce { background: rgba(255,68,102,0.07); border:1px solid rgba(255,68,102,0.2); }
  .wall-row.pe { background: rgba(0,229,160,0.07); border:1px solid rgba(0,229,160,0.2); }
  .wall-left { display:flex; align-items:center; gap:10px; }
  .wall-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .wall-dot.ce { background:var(--red); box-shadow:var(--glow-r); }
  .wall-dot.pe { background:var(--green); box-shadow:var(--glow-g); }
  .wall-label { font-size:10px; color:var(--text2); letter-spacing:1px; font-family:'Space Mono',monospace; }
  .wall-strike { font-family:'Space Mono',monospace; font-size:16px; font-weight:700; margin-top:1px; }
  .wall-strike.ce { color:var(--red); }
  .wall-strike.pe { color:var(--green); }
  .wall-right { text-align:right; }
  .wall-oi { font-family:'Space Mono',monospace; font-size:12px; font-weight:700; color:var(--text); }
  .wall-dist { font-size:10px; color:var(--text3); margin-top:2px; }

  /* Zone + Bias */
  .zone-block {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display:grid; grid-template-columns:1fr 1fr; gap:8px;
  }
  .zone-item { }
  .zone-label { font-size:10px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; font-family:'Space Mono',monospace; margin-bottom:4px; }
  .zone-val { font-size:14px; font-weight:700; }

  /* Strategy box */
  .strategy-box {
    margin: 14px 16px;
    border-radius:4px;
    overflow:hidden;
    border: 1px solid var(--border2);
  }
  .strategy-header {
    padding: 8px 14px;
    background: rgba(79,143,255,0.1);
    border-bottom: 1px solid var(--border2);
    display:flex; align-items:center; justify-content:space-between;
  }
  .strategy-tag {
    font-family:'Space Mono',monospace;
    font-size:9px; letter-spacing:2px; color:var(--accent);
    text-transform:uppercase;
  }
  .strategy-type {
    font-size:11px; color:var(--text2);
    font-family:'Space Mono',monospace;
  }
  .strategy-body { padding:12px 14px; background:var(--bg3); }
  .strategy-name { font-size:17px; font-weight:700; color:var(--text); margin-bottom:10px; }
  .strategy-legs { margin-bottom:10px; }
  .leg {
    display:flex; align-items:center; gap:8px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-family:'Share Tech Mono',monospace; font-size:12px;
  }
  .leg:last-child { border-bottom:none; }
  .leg-action {
    font-size:10px; font-weight:700; letter-spacing:1px;
    padding: 2px 6px; border-radius:2px;
    min-width:36px; text-align:center;
  }
  .leg-action.sell { background:rgba(255,68,102,0.2); color:var(--red); border:1px solid rgba(255,68,102,0.3); }
  .leg-action.buy  { background:rgba(0,229,160,0.1); color:var(--green); border:1px solid rgba(0,229,160,0.2); }
  .leg-desc { color:var(--text); }
  .leg-price { margin-left:auto; color:var(--yellow); }
  .strategy-stats {
    display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
    padding-top:10px; border-top:1px solid var(--border);
  }
  .stat { text-align:center; }
  .stat-label { font-size:9px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
  .stat-val { font-family:'Space Mono',monospace; font-size:13px; font-weight:700; }
  .stat-val.risk { color:var(--red); }
  .stat-val.reward { color:var(--green); }
  .stat-val.rr { color:var(--yellow); }

  /* ── RIGHT: WAR ROOM ── */
  .warroom {
    background: var(--bg);
    overflow-y: auto;
    padding-bottom:40px;
  }
  .wr-section {
    border-bottom: 1px solid var(--border);
    padding: 0;
  }
  .wr-header {
    padding: 12px 20px 10px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:space-between;
    user-select:none;
    transition:background 0.15s;
  }
  .wr-header:hover { background:rgba(255,255,255,0.02); }
  .wr-title {
    display:flex; align-items:center; gap:10px;
    font-size:13px; font-weight:700; letter-spacing:1px;
    color:var(--text);
  }
  .wr-icon {
    width:24px; height:24px; border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    font-size:12px;
    flex-shrink:0;
  }
  .wr-chevron {
    font-family:'Space Mono',monospace;
    font-size:10px; color:var(--text3);
    transition:transform 0.2s;
  }
  .wr-chevron.open { transform:rotate(90deg); }
  .wr-body { padding:0 20px 16px; display:none; }
  .wr-body.open { display:block; }

  /* OI Heatmap */
  .heatmap {
    margin-top:12px;
    position:relative;
  }
  .hm-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .hm-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--text3); width:24px; text-align:right; flex-shrink:0; }
  .hm-bars { flex:1; display:flex; gap:2px; align-items:center; }
  .hm-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .hm-bar {
    width:100%; border-radius:1px;
    transition: height 0.4s ease;
    min-height:2px;
  }
  .hm-bar.ce { background:var(--red); opacity:0.7; }
  .hm-bar.pe { background:var(--green); opacity:0.7; }
  .hm-strike {
    font-family:'Share Tech Mono',monospace;
    font-size:8px; color:var(--text3);
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    margin-top:4px;
  }
  .hm-strike.atm { color:var(--yellow); }
  .hm-spot-line {
    position:absolute; top:0; bottom:30px;
    width:1px; background:var(--yellow);
    opacity:0.5;
  }
  .hm-legend { display:flex; gap:16px; margin-top:8px; }
  .hm-legend-item { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--text3); }
  .hm-legend-dot { width:8px; height:8px; border-radius:1px; }

  /* OI Table */
  .oi-table { width:100%; border-collapse:collapse; margin-top:12px; }
  .oi-table th {
    font-family:'Space Mono',monospace;
    font-size:9px; letter-spacing:1px; text-transform:uppercase;
    color:var(--text3); padding:6px 8px;
    border-bottom:1px solid var(--border);
    text-align:right;
  }
  .oi-table th:first-child { text-align:left; }
  .oi-table td {
    font-family:'Share Tech Mono',monospace;
    font-size:12px; padding:7px 8px;
    border-bottom:1px solid var(--border);
    text-align:right;
    color:var(--text);
  }
  .oi-table td:first-child { text-align:left; color:var(--text2); }
  .oi-table tr.atm-row td { background:rgba(255,208,96,0.05); color:var(--yellow); }
  .oi-change.up { color:var(--green); }
  .oi-change.dn { color:var(--red); }
  .oi-change.neutral { color:var(--text3); }
  .oi-signal-tag {
    font-size:9px; padding:2px 6px; border-radius:2px;
    font-family:'Space Mono',monospace; letter-spacing:1px;
  }
  .oi-signal-tag.build { background:rgba(0,229,160,0.1); color:var(--green); border:1px solid rgba(0,229,160,0.2); }
  .oi-signal-tag.unwind { background:rgba(255,68,102,0.1); color:var(--red); border:1px solid rgba(255,68,102,0.2); }
  .oi-signal-tag.flat { background:rgba(106,127,168,0.1); color:var(--text3); border:1px solid var(--border); }

  /* Explain boxes */
  .explain-box {
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:4px;
    padding:14px 16px;
    margin-top:12px;
    line-height:1.7;
    font-size:13px;
    color:var(--text2);
  }
  .explain-box strong { color:var(--text); }
  .explain-box .highlight { color:var(--accent); font-weight:600; }
  .explain-box .good { color:var(--green); }
  .explain-box .bad { color:var(--red); }
  .explain-box .warn { color:var(--yellow); }
  .explain-box p { margin-bottom:10px; }
  .explain-box p:last-child { margin-bottom:0; }
  .explain-box ul { margin:8px 0 8px 16px; }
  .explain-box li { margin-bottom:5px; }

  /* IV Skew */
  .iv-row {
    display:flex; align-items:center; gap:10px;
    padding:5px 0;
    border-bottom:1px solid var(--border);
  }
  .iv-row:last-child { border-bottom:none; }
  .iv-label { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text2); width:90px; flex-shrink:0; }
  .iv-bar-wrap { flex:1; }
  .iv-bar {
    height:6px; border-radius:1px;
    transition:width 0.4s ease;
  }
  .iv-val { font-family:'Space Mono',monospace; font-size:11px; color:var(--text); width:44px; text-align:right; flex-shrink:0; }
  .iv-row.atm .iv-label { color:var(--yellow); }
  .iv-row.atm .iv-val { color:var(--yellow); }

  /* PCR gauge */
  .pcr-gauge {
    margin-top:14px;
    padding:14px 16px;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:4px;
  }
  .pcr-track {
    position:relative;
    height:8px; border-radius:4px;
    background: linear-gradient(to right,
      var(--green) 0%, var(--green) 20%,
      rgba(100,150,100,0.4) 20%, rgba(100,150,100,0.4) 35%,
      var(--text3) 35%, var(--text3) 65%,
      rgba(150,100,100,0.4) 65%, rgba(150,100,100,0.4) 80%,
      var(--red) 80%);
    margin:10px 0 20px;
  }
  .pcr-needle {
    position:absolute; top:-3px;
    width:14px; height:14px; border-radius:50%;
    background:var(--yellow);
    transform:translateX(-50%);
    box-shadow:0 0 8px rgba(255,208,96,0.5);
    transition:left 0.5s ease;
  }
  .pcr-labels {
    display:flex; justify-content:space-between;
    font-family:'Space Mono',monospace; font-size:8px; color:var(--text3);
    margin-top:4px;
  }
  .pcr-zones {
    display:flex; justify-content:space-between;
    font-size:9px; color:var(--text3);
    margin-top:10px; letter-spacing:0.5px;
  }

  /* Max pain countdown */
  .mp-bar {
    margin-top:12px;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:4px;
    padding:14px 16px;
  }
  .mp-visual {
    position:relative; height:40px; margin:12px 0;
    background:var(--bg3); border-radius:3px;
    border:1px solid var(--border);
    overflow:hidden;
  }
  .mp-range { position:absolute; top:0; bottom:0; background:rgba(79,143,255,0.08); }
  .mp-spot-mark {
    position:absolute; top:0; bottom:0;
    width:2px; background:var(--yellow);
    box-shadow:0 0 6px rgba(255,208,96,0.5);
  }
  .mp-pain-mark {
    position:absolute; top:0; bottom:0;
    width:2px; background:var(--purple);
    box-shadow:0 0 6px rgba(168,85,247,0.5);
  }
  .mp-labels {
    display:flex; justify-content:space-between;
    font-family:'Space Mono',monospace;
    font-size:9px; color:var(--text3);
  }
  .mp-legend { display:flex; gap:16px; margin-top:8px; }
  .mp-legend-item { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--text2); }
  .mp-legend-dot { width:10px; height:2px; border-radius:1px; }

  /* Checklist */
  .checklist { margin-top:12px; }
  .check-item {
    display:flex; align-items:flex-start; gap:10px;
    padding:8px 0;
    border-bottom:1px solid var(--border);
  }
  .check-item:last-child { border-bottom:none; }
  .check-icon { flex-shrink:0; font-size:14px; margin-top:1px; }
  .check-text { font-size:13px; color:var(--text2); line-height:1.5; }
  .check-text strong { color:var(--text); }

  /* Loading */
  .loading {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:300px; gap:16px;
  }
  .loading-ring {
    width:40px; height:40px; border-radius:50%;
    border:2px solid var(--border2);
    border-top-color:var(--accent);
    animation:spin 0.8s linear infinite;
  }
  .loading-text {
    font-family:'Space Mono',monospace;
    font-size:11px; color:var(--text3); letter-spacing:2px;
  }

  /* Error */
  .error-box {
    margin:20px; padding:20px;
    border:1px solid rgba(255,68,102,0.3);
    border-radius:4px;
    background:rgba(255,68,102,0.05);
  }
  .error-title { color:var(--red); font-weight:700; margin-bottom:8px; }
  .error-msg { color:var(--text2); font-size:12px; line-height:1.6; }
  .error-msg code {
    display:block; margin-top:10px; padding:10px;
    background:var(--bg3); border-radius:3px;
    font-family:'Share Tech Mono',monospace; font-size:11px;
    color:var(--cyan); border:1px solid var(--border);
  }

  /* Util */
  .mono { font-family:'Space Mono',monospace; }
  .pill {
    display:inline-block; padding:2px 8px; border-radius:10px;
    font-family:'Space Mono',monospace; font-size:9px; letter-spacing:1px;
    text-transform:uppercase; font-weight:700;
  }
  .pill.bull { background:rgba(0,229,160,0.15); color:var(--green); border:1px solid rgba(0,229,160,0.3); }
  .pill.bear { background:rgba(255,68,102,0.15); color:var(--red);   border:1px solid rgba(255,68,102,0.3); }
  .pill.neut { background:rgba(106,127,168,0.15); color:var(--text2); border:1px solid var(--border2); }
  .pill.warn { background:rgba(255,208,96,0.15); color:var(--yellow); border:1px solid rgba(255,208,96,0.3); }

  .divider { height:1px; background:var(--border); margin:12px 0; }
  .flex-between { display:flex; justify-content:space-between; align-items:center; }
  .text-sm { font-size:11px; }
  .text-xs { font-size:10px; }
  .color-green { color:var(--green); }
  .color-red { color:var(--red); }
  .color-yellow { color:var(--yellow); }
  .color-accent { color:var(--accent); }
  .color-muted { color:var(--text2); }
  .color-dim { color:var(--text3); }
  .mt8 { margin-top:8px; }
  .mt12 { margin-top:12px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">LNP</div>
    <div class="header-title">NSE OI PANEL</div>
  </div>
  <div class="header-right">
    <div class="index-tabs">
      <button class="tab active" onclick="switchIndex(this,'NIFTY')">NIFTY</button>
      <button class="tab" onclick="switchIndex(this,'BANKNIFTY')">BANKNIFTY</button>
      <button class="tab" onclick="switchIndex(this,'FINNIFTY')">FINNIFTY</button>
      <button class="tab" onclick="switchIndex(this,'MIDCPNIFTY')">MIDCAP</button>
      <button class="tab" onclick="switchIndex(this,'NIFTY NEXT 50')">NEXT50</button>
      <button class="tab" onclick="switchIndex(this,'SENSEX')">SENSEX</button>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ REFRESH</button>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let currentIndex = 'NIFTY'
let prevData = null   // previous fetch snapshot for OI delta
let chainData = null  // current parsed chain

// ═══════════════════════════════════════════════════════════
// NSE FETCH
// Calls /api/chain?symbol=NIFTY — the Vercel proxy function (chain.js)
// ═══════════════════════════════════════════════════════════
// NSE symbol map — exact names NSE API accepts
const INDEX_SYMBOLS = {
  'NIFTY':         'NIFTY',
  'BANKNIFTY':     'BANKNIFTY',
  'FINNIFTY':      'FINNIFTY',
  'MIDCPNIFTY':    'MIDCPNIFTY',
  'NIFTY NEXT 50': 'NIFTY NEXT 50',
  'SENSEX':        'SENSEX'
}

async function fetchChain(symbol) {
  const nseSymbol = INDEX_SYMBOLS[symbol] || symbol
  try {
    const res = await fetch(`/api/chain?symbol=${encodeURIComponent(nseSymbol)}`, {
      signal: AbortSignal.timeout(15000)
    })
    if (!res.ok) throw new Error('API responded with ' + res.status)
    const json = await res.json()
    if (json && json.records) return json
    throw new Error('Unexpected response format')
  } catch(e) {
    console.warn('NSE fetch failed:', e.message)
    return null
  }
}

// ═══════════════════════════════════════════════════════════
// PARSE CHAIN — extract all meaningful data
// ═══════════════════════════════════════════════════════════
function parseChain(raw) {
  const records = raw.records
  const data    = records.data || []
  const spot    = records.underlyingValue || 0
  const expiry  = records.expiryDates?.[0] || ''

  // Collect strikes
  const strikes = {}
  for (const row of data) {
    if (row.expiryDate !== expiry) continue
    const k = row.strikePrice
    if (!strikes[k]) strikes[k] = { strike:k, ce:{}, pe:{} }
    if (row.CE) strikes[k].ce = row.CE
    if (row.PE) strikes[k].pe = row.PE
  }

  const strikeList = Object.values(strikes).sort((a,b)=>a.strike-b.strike)

  // ATM = closest to spot
  let atm = strikeList.reduce((best, s) =>
    Math.abs(s.strike - spot) < Math.abs(best.strike - spot) ? s : best
  , strikeList[0])

  // Max pain
  let maxPainStrike = 0, minPainVal = Infinity
  for (const s of strikeList) {
    let loss = 0
    for (const other of strikeList) {
      if (other.strike < s.strike) loss += (other.ce.openInterest||0) * (s.strike - other.strike)
      if (other.strike > s.strike) loss += (other.pe.openInterest||0) * (other.strike - s.strike)
    }
    if (loss < minPainVal) { minPainVal = loss; maxPainStrike = s.strike }
  }

  // CE/PE walls (max OI strike)
  let ceWall = strikeList.reduce((b,s) => (s.ce.openInterest||0) > (b.ce.openInterest||0) ? s : b, strikeList[0])
  let peWall = strikeList.reduce((b,s) => (s.pe.openInterest||0) > (b.pe.openInterest||0) ? s : b, strikeList[0])

  // PCR
  const totalCeOI = strikeList.reduce((s,r)=>s+(r.ce.openInterest||0),0)
  const totalPeOI = strikeList.reduce((s,r)=>s+(r.pe.openInterest||0),0)
  const pcr = totalCeOI > 0 ? totalPeOI / totalCeOI : 1

  // ATM IV (average of CE and PE ATM IV)
  const atmIV = ((atm.ce.impliedVolatility||0) + (atm.pe.impliedVolatility||0)) / 2

  // IV skew — strikes around ATM
  const atmIdx = strikeList.indexOf(atm)
  const skewStrikes = strikeList.slice(Math.max(0,atmIdx-3), atmIdx+4)

  // Top OI strikes for change table
  const topCE = [...strikeList].sort((a,b)=>(b.ce.openInterest||0)-(a.ce.openInterest||0)).slice(0,6)
  const topPE = [...strikeList].sort((a,b)=>(b.pe.openInterest||0)-(a.pe.openInterest||0)).slice(0,6)

  // Near strikes for table (ATM ± 5)
  const nearStrikes = strikeList.slice(Math.max(0,atmIdx-5), atmIdx+6)

  return {
    spot, expiry, atm: atm.strike,
    maxPainStrike, ceWall, peWall,
    pcr, totalCeOI, totalPeOI, atmIV,
    skewStrikes, topCE, topPE, nearStrikes,
    strikeList, atm: atm.strike,
    atmRow: atm,
    timestamp: new Date()
  }
}

// ═══════════════════════════════════════════════════════════
// STRATEGY ENGINE
// ═══════════════════════════════════════════════════════════
function computeStrategy(d) {
  const { spot, ceWall, peWall, maxPainStrike, pcr, atm, atmRow } = d
  const ceWallStr = ceWall.strike
  const peWallStr = peWall.strike
  const distToCe  = ceWallStr - spot
  const distToPe  = spot - peWallStr
  const inRange   = spot > peWallStr && spot < ceWallStr
  const abovePain = spot > maxPainStrike
  const step      = ceWallStr > 25000 ? 100 : ceWallStr > 20000 ? 100 : 50

  // Score signals
  let bullSignals = 0, bearSignals = 0, reasons = []

  if (pcr > 1.3)  { bearSignals += 2; reasons.push({ dir:'bear', text: `PCR ${pcr.toFixed(2)} is strongly bearish — heavy put buying` }) }
  else if (pcr > 1.1) { bearSignals += 1; reasons.push({ dir:'bear', text: `PCR ${pcr.toFixed(2)} mildly bearish` }) }
  else if (pcr < 0.7) { bullSignals += 2; reasons.push({ dir:'bull', text: `PCR ${pcr.toFixed(2)} is strongly bullish — heavy call buying` }) }
  else if (pcr < 0.9) { bullSignals += 1; reasons.push({ dir:'bull', text: `PCR ${pcr.toFixed(2)} mildly bullish` }) }
  else { reasons.push({ dir:'neut', text: `PCR ${pcr.toFixed(2)} neutral — no strong bias` }) }

  if (distToCe < 150)  { bearSignals += 2; reasons.push({ dir:'bear', text: `Only ${Math.round(distToCe)}pts to CE wall — strong resistance near` }) }
  else if (distToCe < 300) { bearSignals += 1; reasons.push({ dir:'warn', text: `${Math.round(distToCe)}pts to CE wall — watch resistance` }) }

  if (distToPe < 150) { bullSignals += 2; reasons.push({ dir:'bull', text: `Only ${Math.round(distToPe)}pts to PE wall — strong support near` }) }

  if (!abovePain && Math.abs(spot - maxPainStrike) < 200) {
    bullSignals += 1; reasons.push({ dir:'bull', text: `Spot below max pain (${maxPainStrike}) — gravity pulls up` })
  } else if (abovePain && Math.abs(spot - maxPainStrike) < 200) {
    bearSignals += 1; reasons.push({ dir:'bear', text: `Spot above max pain (${maxPainStrike}) — gravity pulls down` })
  }

  // Determine direction
  let dir = 'neutral', zone = 'IN RANGE', bias = 'NEUTRAL'
  if (!inRange && spot >= ceWallStr) { dir = 'bull'; zone = 'ABOVE CE WALL'; bias = 'STRONG BULL' }
  else if (!inRange && spot <= peWallStr) { dir = 'bear'; zone = 'BELOW PE WALL'; bias = 'STRONG BEAR' }
  else if (bullSignals > bearSignals + 1) { dir = 'bull'; bias = 'BULLISH' }
  else if (bearSignals > bullSignals + 1) { dir = 'bear'; bias = 'BEARISH' }
  else if (bearSignals === bullSignals && bearSignals > 0) { dir = 'range'; bias = 'RANGE BOUND' }
  else { dir = 'range'; bias = 'NEUTRAL' }

  // Strategy
  let strategy = {}
  const cePrice = atmRow.ce?.lastPrice || 0
  const pePrice = atmRow.pe?.lastPrice || 0

  if (dir === 'bear') {
    const sellStrike = ceWallStr
    const buyStrike  = ceWallStr - step
    const sellCE = ceWall.ce?.lastPrice || 0
    const buyCE  = d.strikeList.find(s=>s.strike===buyStrike)?.ce?.lastPrice || 0
    const maxLoss = (sellStrike - buyStrike) * 25 - Math.round((sellCE - buyCE) * 25)
    const maxGain = Math.round((sellCE - buyCE) * 25)
    strategy = {
      name: 'BEAR CALL SPREAD',
      type: 'Range / Bearish',
      rationale: `Selling resistance at CE wall (${sellStrike}) — ${(ceWall.ce?.openInterest/100000||0).toFixed(1)}L contracts defending this level`,
      legs: [
        { action:'SELL', desc:`${sellStrike} CE`, price: sellCE.toFixed(1) },
        { action:'BUY',  desc:`${buyStrike} CE`,  price: buyCE.toFixed(1) }
      ],
      risk:   Math.abs(maxLoss),
      reward: Math.abs(maxGain),
      exit:   `Exit if ${sellStrike} CE OI drops >20% OR spot closes above ${sellStrike + step}`
    }
  } else if (dir === 'bull') {
    const sellStrike = peWallStr
    const buyStrike  = peWallStr + step
    const sellPE = peWall.pe?.lastPrice || 0
    const buyPE  = d.strikeList.find(s=>s.strike===buyStrike)?.pe?.lastPrice || 0
    const maxLoss = (buyStrike - sellStrike) * 25 - Math.round((sellPE - buyPE) * 25)
    const maxGain = Math.round((sellPE - buyPE) * 25)
    strategy = {
      name: 'BULL PUT SPREAD',
      type: 'Range / Bullish',
      rationale: `Selling support at PE wall (${sellStrike}) — ${(peWall.pe?.openInterest/100000||0).toFixed(1)}L contracts defending this level`,
      legs: [
        { action:'SELL', desc:`${sellStrike} PE`, price: sellPE.toFixed(1) },
        { action:'BUY',  desc:`${buyStrike} PE`,  price: buyPE.toFixed(1) }
      ],
      risk:   Math.abs(maxLoss),
      reward: Math.abs(maxGain),
      exit:   `Exit if ${sellStrike} PE OI drops >20% OR spot closes below ${sellStrike - step}`
    }
  } else {
    // Neutral — Iron Condor
    const scStrike = ceWallStr, bcStrike = ceWallStr + step
    const spStrike = peWallStr, bpStrike = peWallStr - step
    const scPrice = ceWall.ce?.lastPrice || 0
    const spPrice = peWall.pe?.lastPrice || 0
    const maxGain = Math.round((scPrice + spPrice) * 25)
    strategy = {
      name: 'IRON CONDOR',
      type: 'Range Bound',
      rationale: `Market trapped between CE wall (${scStrike}) and PE wall (${spStrike}). Sell both walls, collect premium from both sides.`,
      legs: [
        { action:'SELL', desc:`${scStrike} CE`, price: scPrice.toFixed(1) },
        { action:'BUY',  desc:`${bcStrike} CE`, price:'hedge' },
        { action:'SELL', desc:`${spStrike} PE`, price: spPrice.toFixed(1) },
        { action:'BUY',  desc:`${bpStrike} PE`, price:'hedge' },
      ],
      risk:   step * 25 - Math.abs(maxGain),
      reward: Math.abs(maxGain),
      exit:   `Exit if spot breaks above ${scStrike} or below ${spStrike}`
    }
  }

  return { dir, zone, bias, strategy, reasons, bullSignals, bearSignals }
}

          <p><strong class="warn">Most important signal:</strong> If CE Wall OI drops suddenly by 15-20% on one refresh — the institutions who built that wall are running. Exit bear trades immediately.</p>
        </div>
        <table class="oi-table">
          <thead><tr>
            <th>STRIKE</th>
            <th>CE OI</th>
            <th>CE Δ</th>
            <th>CE SIGNAL</th>
            <th>PE OI</th>
            <th>PE Δ</th>
            <th>PE SIGNAL</th>
          </tr></thead>
          <tbody>
            ${oiRows.map(r=>{
              const ceClass = r.ceDiff > 0 ? 'up' : r.ceDiff < 0 ? 'dn' : 'neutral'
              const peClass = r.peDiff > 0 ? 'up' : r.peDiff < 0 ? 'dn' : 'neutral'
              const ceSig   = r.ceDiff > 50000 ? '<span class="oi-signal-tag build">BUILDING</span>' : r.ceDiff < -50000 ? '<span class="oi-signal-tag unwind">UNWINDING</span>' : '<span class="oi-signal-tag flat">FLAT</span>'
              const peSig   = r.peDiff > 50000 ? '<span class="oi-signal-tag build">BUILDING</span>' : r.peDiff < -50000 ? '<span class="oi-signal-tag unwind">UNWINDING</span>' : '<span class="oi-signal-tag flat">FLAT</span>'
              const rowClass = r.isAtm ? 'class="atm-row"' : ''
              return `<tr ${rowClass}>
                <td>${r.strike}${r.isAtm?' ◆':''}</td>
                <td>${(r.ceOI/100000).toFixed(1)}L</td>
                <td class="oi-change ${ceClass}">${r.ceDiff>=0?'+':''}${(r.ceDiff/100000).toFixed(2)}L</td>
                <td>${ceSig}</td>
                <td>${(r.peOI/100000).toFixed(1)}L</td>
                <td class="oi-change ${peClass}">${r.peDiff>=0?'+':''}${(r.peDiff/100000).toFixed(2)}L</td>
                <td>${peSig}</td>
              </tr>`
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- SECTION 3: PCR Deep Dive -->
    <div class="wr-section">
      <div class="wr-header" onclick="toggleSection(this)">
        <div class="wr-title">
          <div class="wr-icon" style="background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);color:var(--purple)">◎</div>
          PCR ANALYSIS — PUT CALL RATIO EXPLAINED
        </div>
        <span class="wr-chevron">▶</span>
      </div>
      <div class="wr-body">
        <div class="pcr-gauge">
          <div class="flex-between">
            <span style="font-size:12px;color:var(--text2)">Current PCR</span>
            <span class="mono" style="font-size:20px;font-weight:700;color:${pcr>1.1?'var(--red)':pcr<0.9?'var(--green)':'var(--text)'}">${pcr.toFixed(2)}</span>
          </div>
          <div class="pcr-track">
            <div class="pcr-needle" style="left:${pcrNeedle}%"></div>
          </div>
          <div class="pcr-labels">
            <span>0.5</span><span>0.7</span><span>0.9</span><span>1.1</span><span>1.3</span><span>1.5+</span>
          </div>
          <div class="pcr-zones">

            <span style="color:var(--text3)">Mild Bull</span>
            <span style="color:var(--text3)">NEUTRAL</span>
            <span style="color:var(--text3)">Mild Bear</span>
            <span style="color:var(--red)">BEAR</span>
          </div>
        </div>
        <div class="explain-box mt12">
          <p><strong>What PCR ${pcr.toFixed(2)} means right now:</strong></p>
          <p>${pcrDesc}</p>
          <p>For every 100 Call contracts, there are <strong>${Math.round(pcr*100)} Put contracts</strong> traded today. ${pcr>1?`More people are buying puts than calls — bearish positioning.`:`More people are buying calls than puts — bullish positioning.`}</p>
          <p><strong class="warn">Important nuance:</strong> Extreme PCR is often CONTRARIAN. PCR > 1.5 means so many people already bought puts that a squeeze upward becomes likely. PCR < 0.6 means so many bought calls that a pullback becomes likely. The market loves to hurt the maximum number of traders.</p>
        </div>
      </div>
    </div>

    <!-- SECTION 4: Max Pain -->
    <div class="wr-section">
      <div class="wr-header" onclick="toggleSection(this)">
        <div class="wr-title">
          <div class="wr-icon" style="background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);color:var(--purple)">⊕</div>
          MAX PAIN — WHERE MARKET WANTS TO EXPIRE
        </div>
        <span class="wr-chevron">▶</span>
      </div>
      <div class="wr-body">
        <div class="mp-bar">
          <div class="flex-between" style="margin-bottom:8px">
            <span style="font-size:12px;color:var(--text2)">Max Pain Strike</span>
            <span class="mono" style="font-size:20px;font-weight:700;color:var(--purple)">${maxPainStrike.toLocaleString('en-IN')}</span>
          </div>
          <div class="mp-visual">
            <div class="mp-range" style="left:${Math.min(parseFloat(spotPct),parseFloat(mpPct))}%;right:${100-Math.max(parseFloat(spotPct),parseFloat(mpPct))}%"></div>
            <div class="mp-spot-mark" style="left:${spotPct}%"></div>
            <div class="mp-pain-mark" style="left:${mpPct}%"></div>
          </div>
          <div class="mp-labels">
            <span>${minStrike}</span>
            <span>${Math.round((minStrike+maxStrike)/2)}</span>
            <span>${maxStrike}</span>
          </div>
          <div class="mp-legend">
            <div class="mp-legend-item"><div class="mp-legend-dot" style="background:var(--yellow)"></div>Spot (${Math.round(spot)})</div>
            <div class="mp-legend-item"><div class="mp-legend-dot" style="background:var(--purple)"></div>Max Pain (${maxPainStrike})</div>
          </div>
        </div>
        <div class="explain-box mt12">
          <p><strong>Max Pain is ${maxPainStrike}. Spot is ${Math.round(spot)}. Distance: ${Math.abs(Math.round(spot-maxPainStrike))}pts ${spot>maxPainStrike?'above':'below'} max pain.</strong></p>
          <p>Max pain is the price where the most option contracts (both CE and PE) expire worthless. Option writers — usually large institutions and market makers — make money when options expire worthless. They have billions of rupees in incentive to push price toward max pain near expiry.</p>
          <p><strong>Days to expiry: ${mpDTE}</strong></p>
          <p>${mpDTE <= 1 ? '<span class="bad">EXPIRY DAY — Max pain gravity at maximum strength. Strong pull toward '+maxPainStrike+'</span>' : mpDTE <= 2 ? '<span class="warn">1 day to expiry — Max pain gravity building. Watch '+maxPainStrike+' as target.</span>' : 'Max pain effect is weak this far from expiry. More relevant from Wednesday onwards.'}</p>
          <p><strong class="warn">Trading implication:</strong> ${spot > maxPainStrike ? `Spot is ${Math.round(spot-maxPainStrike)}pts above max pain. Bearish gravity — market may drift down toward ${maxPainStrike} into expiry.` : `Spot is ${Math.round(maxPainStrike-spot)}pts below max pain. Bullish gravity — market may drift up toward ${maxPainStrike} into expiry.`}</p>
        </div>
      </div>
    </div>

    <!-- SECTION 5: IV Skew -->
    <div class="wr-section">
      <div class="wr-header" onclick="toggleSection(this)">
        <div class="wr-title">
          <div class="wr-icon" style="background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.2);color:var(--cyan)">≈</div>
          IV SKEW — ARE PUTS OR CALLS MORE EXPENSIVE?
        </div>
        <span class="wr-chevron">▶</span>
      </div>
      <div class="wr-body">
        <div class="explain-box">
          <p>Implied Volatility (IV) tells you how expensive an option is. <strong>Higher IV = more expensive = more fear/greed</strong> around that strike. Normally, puts are more expensive than calls (downside fear costs more). When this flips — unusual things are happening.</p>
        </div>
        <div style="margin-top:12px">
          ${ivStrikes.map(row=>{
            const ceIV = row.ce?.impliedVolatility || 0
            const peIV = row.pe?.impliedVolatility || 0
            const isAtm= row.strike === atm
            const maxIV = 40 // scale
            return `
              <div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)">
                <div class="flex-between" style="margin-bottom:4px">
                  <span class="mono text-xs" style="color:${isAtm?'var(--yellow)':'var(--text2)'}">${row.strike}${isAtm?' ◆ ATM':''}</span>
                </div>
                <div class="iv-row ${isAtm?'atm':''}">
                  <div class="iv-label" style="color:var(--red)">CE IV</div>
                  <div class="iv-bar-wrap"><div class="iv-bar" style="width:${Math.min(100,ceIV/maxIV*100)}%;background:var(--red);opacity:0.7"></div></div>
                  <div class="iv-val" style="color:var(--red)">${ceIV.toFixed(1)}%</div>
                </div>
                <div class="iv-row ${isAtm?'atm':''}" style="margin-top:3px">
                  <div class="iv-label" style="color:var(--green)">PE IV</div>
                  <div class="iv-bar-wrap"><div class="iv-bar" style="width:${Math.min(100,peIV/maxIV*100)}%;background:var(--green);opacity:0.7"></div></div>
                  <div class="iv-val" style="color:var(--green)">${peIV.toFixed(1)}%</div>
                </div>
              </div>
            `
          }).join('')}
        </div>
        <div class="explain-box mt12">
          <p><strong>Reading IV Skew:</strong> If PE IV is significantly higher than CE IV across all strikes — the market is pricing in more fear of a downward move. This is normal in Indian markets. When CE IV suddenly spikes above PE IV — someone is aggressively buying calls = bullish activity expected.</p>
          <p><strong>ATM IV: ${d.atmIV.toFixed(1)}%</strong> — ${d.atmIV > 20 ? '<span class="bad">High IV — options are expensive. Better to SELL options (collect premium).</span>' : d.atmIV > 12 ? '<span class="warn">Moderate IV — balanced conditions.</span>' : '<span class="good">Low IV — options are cheap. Better to BUY options.</span>'}</p>
        </div>
      </div>
    </div>

    <!-- SECTION 6: Strategy Deep Dive -->
    <div class="wr-section">
      <div class="wr-header" onclick="toggleSection(this)">
        <div class="wr-title">
          <div class="wr-icon" style="background:rgba(255,208,96,0.1);border:1px solid rgba(255,208,96,0.2);color:var(--yellow)">⚡</div>
          STRATEGY EXPLAINED — WHY THIS TRADE?
        </div>
        <span class="wr-chevron open">▶</span>
      </div>
      <div class="wr-body open">

          ${reasons.map(r=>`
            <div class="check-item">
              <span class="check-icon">${r.dir==='bull'?'🟢':r.dir==='bear'?'🔴':r.dir==='warn'?'🟡':'⚪'}</span>
              <span class="check-text">${r.text}</span>
            </div>
          `).join('')}
        </div>

        <div class="explain-box mt12">
          <p><strong>What makes this trade work:</strong></p>
          <ul>
            ${checklist.filter(c=>c.type==='good').map(c=>`<li class="good">✅ ${c.text}</li>`).join('')}
          </ul>
          <p style="margin-top:10px"><strong>What kills this trade:</strong></p>
          <ul>
            ${checklist.filter(c=>c.type==='bad').map(c=>`<li class="bad">❌ ${c.text}</li>`).join('')}
          </ul>
          <p style="margin-top:10px"><strong class="warn">Exit Rule:</strong> ${strategy.exit}</p>
        </div>
      </div>
    </div>

    <!-- SECTION 7: Learning Corner -->
    <div class="wr-section">
      <div class="wr-header" onclick="toggleSection(this)">
        <div class="wr-title">
          <div class="wr-icon" style="background:rgba(79,143,255,0.1);border:1px solid rgba(79,143,255,0.2);color:var(--accent)">📖</div>
          LEARNING CORNER — OPTIONS CONCEPTS
        </div>
        <span class="wr-chevron">▶</span>
      </div>
      <div class="wr-body">
        <div class="explain-box">
          <p><strong>OI vs Volume — What's the difference?</strong></p>
          <p><strong>Volume</strong> = how many contracts were traded TODAY. Resets to 0 at 9:15 every day.</p>
          <p><strong>Open Interest (OI)</strong> = how many contracts are currently OPEN (not yet squared off). This builds over time. High OI = many people have active positions = this strike matters.</p>
          <p>Think of it like this: Volume is how many people entered a shop today. OI is how many people are still inside the shop right now.</p>
        </div>
        <div class="explain-box mt12">
          <p><strong>Why do Call Writers create a ceiling?</strong></p>
          <p>When an institution sells 80L call contracts at 24,600, they collect premium. If Nifty closes above 24,600 on expiry, they have to pay the difference. So they <strong>actively sell Nifty futures</strong> when price approaches 24,600 to keep it below that level. This is called <strong>delta hedging</strong> — it is mechanical, predictable, and creates the wall you see in the OI data.</p>
        </div>
        <div class="explain-box mt12">
          <p><strong>What is Theta decay?</strong></p>
          <p>Every option loses value every day just by time passing — even if the underlying doesn't move. This is called Theta. On Monday a 24,600 CE might be worth ₹80. On Wednesday (same Nifty level) it might be ₹45. On Friday (expiry day) it might be ₹5. This is why option <strong>sellers</strong> (who wrote the CE wall) make money just by waiting. Time is their friend. Time is the buyer's enemy.</p>
        </div>
      </div>
    </div>
  `
  return html
}

// HELPERS
// ═══════════════════════════════════════════════════════════
function buildChecklist(d, s) {
  const checks = []
  const { pcr, ceWall, peWall, spot, atmIV } = d
  const { dir } = s

  if (dir === 'bear') {
    checks.push({type:'good', text:`CE wall at ${ceWall.strike} has ${(ceWall.ce?.openInterest/100000||0).toFixed(1)}L contracts — institutions defending this level`})
    if (pcr > 1.0) checks.push({type:'good', text:`PCR ${pcr.toFixed(2)} favors bearish positioning`})
    if (atmIV > 14) checks.push({type:'good', text:`IV at ${d.atmIV.toFixed(1)}% — premium collection is worthwhile`})
    checks.push({type:'bad', text:`A sudden bullish breakout above ${ceWall.strike} — CE wall collapses`})
    checks.push({type:'bad', text:`CE wall OI drops by 20%+ on next refresh — writers covering`})
    if (pcr > 1.3) checks.push({type:'bad', text:`PCR is extreme (${pcr.toFixed(2)}) — contrarian squeeze risk`})
  } else if (dir === 'bull') {
    checks.push({type:'good', text:`PE wall at ${peWall.strike} has ${(peWall.pe?.openInterest/100000||0).toFixed(1)}L contracts — strong floor`})
    if (pcr < 1.0) checks.push({type:'good', text:`PCR ${pcr.toFixed(2)} favors bullish positioning`})
    checks.push({type:'bad', text:`Sudden breakdown below ${peWall.strike} — PE wall collapses`})
    checks.push({type:'bad', text:`PE wall OI drops by 20%+ — floor weakening`})
  } else {
    checks.push({type:'good', text:`Market range defined: ${peWall.strike} to ${ceWall.strike} — both walls intact`})
    checks.push({type:'good', text:`Selling both walls — collecting premium from both CE and PE`})
    checks.push({type:'bad', text:`Any strong directional move breaking either wall`})
    checks.push({type:'bad', text:`News event causing gap up or gap down beyond either wall`})
  }
  return checks
}

function getDTE(expiryStr) {
  try {
    const parts = expiryStr.split('-')
    const months = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11}
    const d = new Date(parseInt(parts[2]), months[parts[1].toUpperCase()], parseInt(parts[0]))
    const today = new Date(); today.setHours(0,0,0,0)
    return Math.max(0, Math.round((d-today)/(1000*60*60*24)))
  } catch(e) { return '?' }
}

function toggleSection(header) {
  const body = header.nextElementSibling
  const chev = header.querySelector('.wr-chevron')
  const isOpen = body.classList.contains('open')
  body.classList.toggle('open', !isOpen)
  chev.classList.toggle('open', !isOpen)
}

function switchIndex(el, idx) {
  currentIndex = idx
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  el.classList.add('active')
  prevData = null
  loadData()
}

// ═══════════════════════════════════════════════════════════
// MAIN LOAD
// ═══════════════════════════════════════════════════════════
async function loadData() {
  const btn = document.getElementById('refreshBtn')
  btn.classList.add('spinning')
  document.getElementById('lastUpdate').textContent = 'Loading...'

  // Show loading
  document.getElementById('loadingLeft').style.display = 'flex'
  document.getElementById('commandContent').style.display = 'none'
  document.getElementById('loadingRight').style.display = 'flex'
  document.getElementById('warContent').style.display = 'none'

  try {
    const raw = await fetchChain(currentIndex)
    if (!raw) throw new Error('Could not reach NSE. This is a CORS issue — the app needs to run via the Vercel proxy to access NSE data. For now, loading demo data.')

    const d = parseChain(raw)
    chainData = d

    const s = computeStrategy(d)

    document.getElementById('commandContent').innerHTML = renderCommand(d, s)
    document.getElementById('warContent').innerHTML = renderWarRoom(d, s)

    document.getElementById('loadingLeft').style.display = 'none'
    document.getElementById('commandContent').style.display = 'block'
    document.getElementById('loadingRight').style.display = 'none'
    document.getElementById('warContent').style.display = 'block'

    document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit'})

    // Save snapshot for next OI delta
    if (chainData) {
      prevData = { strikes: {} }
      for (const row of d.nearStrikes) {
        prevData.strikes[row.strike] = {
          ce: row.ce?.openInterest || 0,
          pe: row.pe?.openInterest || 0
        }
      }
    }
  } catch(e) {
    loadDemo(e.message)
  }
  btn.classList.remove('spinning')
}

// Demo data for when NSE is unreachable (CORS in dev mode)
function loadDemo(errMsg) {
  const spot = 24387
  const demoRaw = buildDemoData(spot)
  const d = parseChain(demoRaw)
  const s = computeStrategy(d)

  document.getElementById('commandContent').innerHTML = `
    <div class="error-box" style="margin:12px">
      <div class="error-title">⚠ DEMO MODE — NSE data unavailable</div>
      <div class="error-msg">
        ${errMsg}<br><br>
        <strong>To get live data:</strong> Deploy this app to Vercel with the proxy function (see instructions below). The layout and all calculations are shown with realistic demo data.
        <code>Deploy to Vercel → add /api/chain.js proxy → live NSE data works</code>
      </div>
    </div>
  ` + renderCommand(d, s)

  document.getElementById('warContent').innerHTML = renderWarRoom(d, s)

  document.getElementById('loadingLeft').style.display = 'none'
  document.getElementById('commandContent').style.display = 'block'
  document.getElementById('loadingRight').style.display = 'none'
  document.getElementById('warContent').style.display = 'block'
  document.getElementById('lastUpdate').textContent = 'DEMO DATA'
}

function buildDemoData(spot) {
  const step = 50
  const base = Math.round(spot / step) * step
  const data = []
  const expiry = '26-Mar-2026'

  const ceOIProfile = {0:45,1:82,2:61,3:38,4:22,5:14,6:9,[-1]:28,[-2]:18,[-3]:12,[-4]:8,[-5]:5}
  const peOIProfile = {0:52,1:91,2:68,3:41,[-1]:31,[-2]:19,[-3]:12,1:91,2:68,3:41}

  for (let i = -8; i <= 8; i++) {
    const strike = base + i * step
    const atmDist = Math.abs(i)
    const ceOI = Math.max(5, Math.round((i >= 0 ? Math.max(8, 80 - i*10 + (i===2?15:0)) : Math.max(5, 30 - atmDist*5)) * 100000 + Math.random()*50000))
    const peOI = Math.max(5, Math.round((i <= 0 ? Math.max(8, 80 + i*9 + (i===-2?18:0)) : Math.max(5, 30 - atmDist*5)) * 100000 + Math.random()*50000))
    const atmIV = 14 + atmDist * 0.8
    data.push({
      strikePrice: strike, expiryDate: expiry,
      CE: { strikePrice:strike, openInterest:ceOI, changeinOpenInterest:Math.round((Math.random()-0.4)*ceOI*0.1), lastPrice: Math.max(1, Math.round((spot - strike + 150 + Math.random()*20)*0.7)), impliedVolatility: atmIV + (i>0?0:1.5), totalTradedVolume: Math.round(ceOI*0.3) },
      PE: { strikePrice:strike, openInterest:peOI, changeinOpenInterest:Math.round((Math.random()-0.4)*peOI*0.1), lastPrice: Math.max(1, Math.round((strike - spot + 150 + Math.random()*20)*0.7)), impliedVolatility: atmIV + (i<0?0:1.2), totalTradedVolume: Math.round(peOI*0.3) }
    })
  }
  return { records: { data, underlyingValue: spot, expiryDates: [expiry] } }
}

// ═══════════════════════════════════════════════════════════
// AUTO-REFRESH every 5 minutes
// ═══════════════════════════════════════════════════════════
loadData()
setInterval(loadData, 5 * 60 * 1000)
</script>
