<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LNP · NSE OI PANEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2f5;--bg2:#f7f8fa;--bg3:#e8eaee;--border:#dde1e8;
  --text:#1e2330;--text2:#52607a;--text3:#8f9bb8;
  --red:#c93535;--red-bg:#fdf1f1;--red-bd:#f5c6c6;
  --green:#177a56;--green-bg:#f1faf6;--green-bd:#b8e8d4;
  --blue:#1d55d4;--blue-bg:#eef3fd;--blue-bd:#b8ccf8;
  --yellow:#c26b00;--yel-bg:#fdf6e8;--yel-bd:#f5d99a;
  --purple:#6530c7;--pur-bg:#f3f0fd;--pur-bd:#d4c8f5;
  --orange:#d44f0a;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased}
.header{background:var(--bg2);border-bottom:2px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,0.06)}
.header-left{display:flex;align-items:center;gap:12px}
.logo{background:#1a1f2e;color:white;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;letter-spacing:2px}
.header-title{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.index-tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{font-size:12px;font-weight:600;padding:5px 12px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;letter-spacing:0.3px}
.tab:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.tab.active{background:var(--blue);border-color:var(--blue);color:white}
.refresh-btn{font-size:12px;font-weight:600;padding:5px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all 0.15s}
.refresh-btn:hover{border-color:var(--text);color:var(--text)}
.refresh-btn.spinning{animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.last-update{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);white-space:nowrap}
.main{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 56px)}
@media(max-width:900px){.main{grid-template-columns:1fr}}
.command{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto}
.spot-block{padding:20px 20px 16px;border-bottom:1px solid var(--border);background:#2a3148;color:white}
.index-name{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.spot-value{font-size:36px;font-weight:800;letter-spacing:-1.5px;line-height:1;color:white;font-family:'JetBrains Mono',monospace}
.spot-meta{margin-top:8px;display:flex;gap:16px}
.spot-meta-item{font-size:11px;color:rgba(255,255,255,0.5)}
.spot-meta-item span{color:rgba(255,255,255,0.85);font-weight:600}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr}
.metric{padding:14px 18px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.metric:nth-child(even){border-right:none}
.metric-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:5px}
.metric-value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px;font-weight:500}
.walls-section{padding:16px 18px;border-bottom:1px solid var(--border)}
.walls-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px}
.wall-card{border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.wall-card:last-child{margin-bottom:0}
.wall-card.ce{background:var(--red-bg);border:1.5px solid var(--red-bd)}
.wall-card.pe{background:var(--green-bg);border:1.5px solid var(--green-bd)}
.wall-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.wall-card.ce .wall-type{color:var(--red)}
.wall-card.pe .wall-type{color:var(--green)}
.wall-strike{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700}
.wall-card.ce .wall-strike{color:var(--red)}
.wall-card.pe .wall-strike{color:var(--green)}
.wall-right{text-align:right}
.wall-oi{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--text)}
.wall-dist{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}
.zone-row{display:grid;grid-template-columns:1fr 1fr;padding:14px 18px;border-bottom:1px solid var(--border);gap:12px}
.zone-box{background:var(--bg3);border-radius:8px;padding:10px 12px}
.zone-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:4px}
.zone-val{font-size:14px;font-weight:700}
.strategy-section{padding:16px 18px}
.strategy-card{border-radius:12px;border:1.5px solid var(--blue-bd);overflow:hidden}
.strategy-head{background:var(--blue);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.strategy-head-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.7);letter-spacing:1px;text-transform:uppercase}
.strategy-head-type{font-size:11px;color:rgba(255,255,255,0.7);font-weight:500}
.strategy-body{padding:14px;background:var(--blue-bg)}
.strategy-name{font-size:18px;font-weight:800;color:var(--blue);margin-bottom:12px;letter-spacing:-0.5px}
.leg{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--blue-bd)}
.leg:last-child{border-bottom:none}
.leg-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:1px;min-width:40px;text-align:center}
.leg-badge.sell{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-bd)}
.leg-badge.buy{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-bd)}
.leg-desc{font-size:13px;font-weight:600;color:var(--text);flex:1}
.leg-price{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--yellow)}
.strategy-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.stat{background:white;border-radius:8px;padding:8px 10px;text-align:center;border:1px solid var(--border)}
.stat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:3px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
.stat-val.risk{color:var(--red)}
.stat-val.reward{color:var(--green)}
.stat-val.rr{color:var(--blue)}
.warroom{background:var(--bg);overflow-y:auto;padding-bottom:40px}
.wr-section{background:var(--bg2);border-radius:12px;margin:12px 16px 0;border:1px solid var(--border);overflow:hidden}
.wr-header{padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;transition:background 0.15s}
.wr-header:hover{background:var(--bg3)}
.wr-title{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;color:var(--text)}
.wr-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.wr-chevron{font-size:11px;color:var(--text3);transition:transform 0.2s;font-family:'JetBrains Mono',monospace}
.wr-chevron.open{transform:rotate(90deg)}
.wr-body{padding:0 18px 16px;display:none}
.wr-body.open{display:block}
.explain-box{background:var(--bg3);border-radius:8px;padding:14px 16px;margin-top:12px;line-height:1.7;font-size:13px;color:var(--text2);border:1px solid var(--border)}
.explain-box strong{color:var(--text)}
.explain-box .good{color:var(--green);font-weight:600}
.explain-box .bad{color:var(--red);font-weight:600}
.explain-box .warn{color:var(--yellow);font-weight:600}
.explain-box p{margin-bottom:10px}
.explain-box p:last-child{margin-bottom:0}
.explain-box ul{margin:8px 0 8px 18px}
.explain-box li{margin-bottom:5px}
.heatmap{margin-top:14px}
.hm-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:4px}
.hm-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;width:22px;text-align:right;flex-shrink:0;padding-bottom:2px}
.hm-bars{flex:1;display:flex;gap:3px;align-items:flex-end}
.hm-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center}
.hm-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px}
.hm-bar.ce{background:var(--red)}
.hm-bar.pe{background:var(--green);border-radius:0 0 3px 3px}
.hm-bar.ce.atm{background:var(--orange)}
.hm-bar.pe.atm{background:#0891b2}
.hm-strike-row{display:flex;gap:3px;margin-left:30px;margin-top:4px}
.hm-strike{flex:1;text-align:center;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text3)}
.hm-strike.atm{color:var(--blue);font-weight:700}
.hm-legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.hm-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-weight:500}
.hm-legend-dot{width:10px;height:10px;border-radius:3px}
.oi-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px}
.oi-table th{background:var(--bg3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:8px 10px;border-bottom:2px solid var(--border);text-align:right}
.oi-table th:first-child{text-align:left}
.oi-table td{font-family:'JetBrains Mono',monospace;padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;color:var(--text)}
.oi-table td:first-child{text-align:left;font-weight:600}
.oi-table tr.atm-row td{background:var(--yel-bg);color:var(--yellow);font-weight:700}
.oi-table tr:hover td{background:var(--bg3)}
.oi-table tr.atm-row:hover td{background:var(--yel-bg)}
.oi-change.up{color:var(--green)}.oi-change.dn{color:var(--red)}.oi-change.neutral{color:var(--text3)}
.tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:0.5px;text-transform:uppercase;display:inline-block}
.tag.build{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.tag.unwind{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.tag.flat{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.pcr-card{background:var(--bg3);border-radius:10px;padding:16px;margin-top:12px;border:1px solid var(--border)}
.pcr-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.pcr-label{font-size:12px;font-weight:600;color:var(--text2)}
.pcr-number{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:800}
.pcr-track{height:10px;border-radius:5px;background:linear-gradient(to right,#16a34a 0%,#16a34a 20%,#86efac 20%,#86efac 35%,#d1d5db 35%,#d1d5db 65%,#fca5a5 65%,#fca5a5 80%,#dc2626 80%);position:relative;margin-bottom:6px}
.pcr-needle{position:absolute;top:-4px;width:18px;height:18px;border-radius:50%;background:white;border:3px solid var(--text);transform:translateX(-50%);transition:left 0.5s ease;box-shadow:0 2px 6px rgba(0,0,0,0.2)}
.pcr-ticks{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3)}
.pcr-zones{display:flex;justify-content:space-between;font-size:10px;font-weight:600;margin-top:8px}
.mp-card{background:var(--bg3);border-radius:10px;padding:16px;margin-top:12px;border:1px solid var(--border)}
.mp-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.mp-label{font-size:12px;font-weight:600;color:var(--text2)}
.mp-number{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:800;color:var(--purple)}
.mp-track{height:32px;background:white;border-radius:6px;position:relative;border:1px solid var(--border);overflow:hidden}
.mp-fill{position:absolute;top:0;bottom:0;background:var(--pur-bg)}
.mp-spot{position:absolute;top:0;bottom:0;width:3px;background:var(--yellow);border-radius:2px}
.mp-pain{position:absolute;top:0;bottom:0;width:3px;background:var(--purple);border-radius:2px}
.mp-labels{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);margin-top:6px}
.mp-legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.mp-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);font-weight:500}
.mp-legend-dot{width:12px;height:3px;border-radius:2px}
.iv-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.iv-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text2);width:60px;flex-shrink:0}
.iv-label.atm{color:var(--blue);font-weight:700}
.iv-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.iv-fill{height:100%;border-radius:3px;transition:width 0.4s}
.iv-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;width:40px;text-align:right}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-icon{flex-shrink:0;font-size:14px;margin-top:1px}
.check-text{font-size:13px;color:var(--text2);line-height:1.5}
.reason-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:6px;font-size:13px;font-weight:500}
.reason-item.bull{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.reason-item.bear{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.reason-item.warn{background:var(--yel-bg);color:var(--yellow);border:1px solid var(--yel-bd)}
.reason-item.neut{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px}
.loading-ring{width:36px;height:36px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--blue);animation:spin 0.8s linear infinite}
.loading-text{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:1px}
.warn-box{margin:14px 14px 0;padding:12px 16px;background:var(--yel-bg);border:1.5px solid var(--yel-bd);border-radius:10px;font-size:12px;color:var(--yellow);font-weight:500;line-height:1.5}
.warn-box strong{font-weight:700}
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px;margin-top:14px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.mono{font-family:'JetBrains Mono',monospace}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.mt12{margin-top:12px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo">LNP</div>
    <div class="header-title">NSE OI Panel</div>
  </div>
  <div class="header-right">
    <div class="index-tabs">
      <button class="tab active" onclick="switchIndex(this,'NIFTY')">NIFTY</button>
      <button class="tab" onclick="switchIndex(this,'BANKNIFTY')">BANKNIFTY</button>
      <button class="tab" onclick="switchIndex(this,'FINNIFTY')">FINNIFTY</button>
      <button class="tab" onclick="switchIndex(this,'MIDCPNIFTY')">MIDCAP</button>
      <button class="tab" onclick="switchIndex(this,'NIFTY NEXT 50')">NEXT50</button>
      <button class="tab" onclick="switchIndex(this,'SENSEX')">SENSEX</button>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ Refresh</button>
    <span class="last-update" id="lastUpdate">—</span>
  </div>
</div>
<div class="main">
  <div class="command" id="commandPanel">
    <div class="loading" id="loadingLeft"><div class="loading-ring"></div><div class="loading-text">LOADING CHAIN DATA</div></div>
    <div id="commandContent" style="display:none"></div>
  </div>
  <div class="warroom" id="warRoom">
    <div class="loading" id="loadingRight"><div class="loading-ring"></div><div class="loading-text">BUILDING ANALYSIS</div></div>
    <div id="warContent" style="display:none;padding-bottom:24px"></div>
  </div>
</div>
<script>
let currentIndex='NIFTY',prevData=null,chainData=null
const INDEX_SYMBOLS={'NIFTY':'NIFTY','BANKNIFTY':'BANKNIFTY','FINNIFTY':'FINNIFTY','MIDCPNIFTY':'MIDCPNIFTY','NIFTY NEXT 50':'NIFTY NEXT 50','SENSEX':'SENSEX'}
// Data source indicator
let dataSource = 'demo'

async function fetchChain(symbol){
  const nseSymbol=INDEX_SYMBOLS[symbol]||symbol
  const encoded=encodeURIComponent(nseSymbol)
  const nseUrl=`https://www.nseindia.com/api/option-chain-indices?symbol=${encoded}`

  // Strategy 1: Local proxy on trading PC (most reliable — never blocked by NSE)
  // Run nse-proxy.js on your PC to enable this
  try {
    const res = await fetch(`http://localhost:3001/chain?symbol=${encoded}`,{signal:AbortSignal.timeout(4000)})
    if(res.ok){const json=await res.json();if(json&&json.records){dataSource='local';return json}}
  } catch(e){}

  // Strategy 2: Vercel server proxy (chain.js)
  try {
    const res = await fetch(`/api/chain?symbol=${encoded}`,{signal:AbortSignal.timeout(12000)})
    if(res.ok){const json=await res.json();if(json&&json.records){dataSource='vercel';return json}}
  } catch(e){}

  // Strategy 3: Public CORS proxies (fallback)
  const proxies=[
    `https://api.allorigins.win/raw?url=${encodeURIComponent(nseUrl)}`,
    `https://corsproxy.io/?${encodeURIComponent(nseUrl)}`,
  ]
  for(const url of proxies){
    try{
      const res=await fetch(url,{signal:AbortSignal.timeout(10000)})
      if(!res.ok)continue
      const json=await res.json()
      if(json&&json.records){dataSource='proxy';return json}
    }catch(e){continue}
  }

  dataSource='demo'
  return null
}
function parseChain(raw){
  const records=raw.records,data=records.data||[],spot=records.underlyingValue||0,expiry=records.expiryDates?.[0]||''
  const strikes={}
  for(const row of data){if(row.expiryDate!==expiry)continue;const k=row.strikePrice;if(!strikes[k])strikes[k]={strike:k,ce:{},pe:{}};if(row.CE)strikes[k].ce=row.CE;if(row.PE)strikes[k].pe=row.PE}
  const strikeList=Object.values(strikes).sort((a,b)=>a.strike-b.strike)
  let atm=strikeList.reduce((best,s)=>Math.abs(s.strike-spot)<Math.abs(best.strike-spot)?s:best,strikeList[0])
  let maxPainStrike=0,minPainVal=Infinity
  for(const s of strikeList){let loss=0;for(const other of strikeList){if(other.strike<s.strike)loss+=(other.ce.openInterest||0)*(s.strike-other.strike);if(other.strike>s.strike)loss+=(other.pe.openInterest||0)*(other.strike-s.strike)}if(loss<minPainVal){minPainVal=loss;maxPainStrike=s.strike}}
  const ceWall=strikeList.reduce((b,s)=>(s.ce.openInterest||0)>(b.ce.openInterest||0)?s:b,strikeList[0])
  const peWall=strikeList.reduce((b,s)=>(s.pe.openInterest||0)>(b.pe.openInterest||0)?s:b,strikeList[0])
  const totalCeOI=strikeList.reduce((s,r)=>s+(r.ce.openInterest||0),0)
  const totalPeOI=strikeList.reduce((s,r)=>s+(r.pe.openInterest||0),0)
  const pcr=totalCeOI>0?totalPeOI/totalCeOI:1
  const atmIV=((atm.ce.impliedVolatility||0)+(atm.pe.impliedVolatility||0))/2
  const atmIdx=strikeList.indexOf(atm)
  return{spot,expiry,atm:atm.strike,maxPainStrike,ceWall,peWall,pcr,totalCeOI,totalPeOI,atmIV,
    skewStrikes:strikeList.slice(Math.max(0,atmIdx-3),atmIdx+4),
    nearStrikes:strikeList.slice(Math.max(0,atmIdx-5),atmIdx+6),
    strikeList,atmRow:atm,timestamp:new Date()}
}
function computeStrategy(d){
  const{spot,ceWall,peWall,maxPainStrike,pcr}=d
  const ceWallStr=ceWall.strike,peWallStr=peWall.strike
  const distToCe=ceWallStr-spot,distToPe=spot-peWallStr
  const inRange=spot>peWallStr&&spot<ceWallStr,abovePain=spot>maxPainStrike
  const step=ceWallStr>20000?100:50
  let bullSignals=0,bearSignals=0,reasons=[]

  else{reasons.push({dir:'neut',text:`PCR ${pcr.toFixed(2)} — neutral, no strong directional bias`})}

  else if(distToCe<300){bearSignals+=1;reasons.push({dir:'warn',text:`${Math.round(distToCe)}pts to CE wall — watch resistance`})}
  if(distToPe<150){bullSignals+=2;reasons.push({dir:'bull',text:`Only ${Math.round(distToPe)}pts to PE wall — strong support nearby`})}
  if(!abovePain&&Math.abs(spot-maxPainStrike)<200){bullSignals+=1;reasons.push({dir:'bull',text:`Spot below max pain (${maxPainStrike}) — gravity pulls up`})}
  else if(abovePain&&Math.abs(spot-maxPainStrike)<200){bearSignals+=1;reasons.push({dir:'bear',text:`Spot above max pain (${maxPainStrike}) — gravity pulls down`})}

      legs:[{action:'SELL',desc:`${ss} PE`,price:sp.toFixed(1)},{action:'BUY',desc:`${bs} PE`,price:bp.toFixed(1)}],
      risk:Math.abs((bs-ss)*25-Math.round((sp-bp)*25)),reward:Math.abs(Math.round((sp-bp)*25)),

    if(pcr>1.0)checks.push({type:'good',text:`PCR ${pcr.toFixed(2)} supports bearish trade`})
    if(atmIV>14)checks.push({type:'good',text:`IV at ${atmIV.toFixed(1)}% — premium collection worthwhile`})
    checks.push({type:'bad',text:`Bullish breakout above ${ceWall.strike} — CE wall collapses`})
    checks.push({type:'bad',text:`CE wall OI drops 20%+ on next refresh — writers exiting`})
  }else if(dir==='bull'){
    checks.push({type:'good',text:`PE wall at ${peWall.strike} has ${(peWall.pe?.openInterest/100000||0).toFixed(1)}L contracts as floor`})
    if(pcr<1.0)checks.push({type:'good',text:`PCR ${pcr.toFixed(2)} supports bullish trade`})
    checks.push({type:'bad',text:`Breakdown below ${peWall.strike} — PE wall collapses`})
    checks.push({type:'bad',text:`PE wall OI drops 20%+ — floor weakening`})
  }else{
    checks.push({type:'good',text:`Range defined: ${peWall.strike} to ${ceWall.strike} — both walls intact`})
    checks.push({type:'good',text:`Collecting premium from both CE and PE sides`})
    checks.push({type:'bad',text:`Strong directional move breaking either wall`})
    checks.push({type:'bad',text:`News event causing gap up or gap down beyond either wall`})
  }
  return checks
}
function getDTE(expiryStr){
  try{const parts=expiryStr.split('-'),months={JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11},d=new Date(parseInt(parts[2]),months[parts[1].toUpperCase()],parseInt(parts[0])),today=new Date();today.setHours(0,0,0,0);return Math.max(0,Math.round((d-today)/(1000*60*60*24)))}catch(e){return'?'}
}
function toggleSection(header){const body=header.nextElementSibling,chev=header.querySelector('.wr-chevron'),isOpen=body.classList.contains('open');body.classList.toggle('open',!isOpen);chev.classList.toggle('open',!isOpen)}
function switchIndex(el,idx){currentIndex=idx;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');prevData=null;loadData()}
async function loadData(){
  const btn=document.getElementById('refreshBtn');btn.classList.add('spinning');document.getElementById('lastUpdate').textContent='Loading...'
  document.getElementById('loadingLeft').style.display='flex';document.getElementById('commandContent').style.display='none'
  document.getElementById('loadingRight').style.display='flex';document.getElementById('warContent').style.display='none'
  try{
    const raw=await fetchChain(currentIndex);if(!raw)throw new Error('NSE unreachable')
    const d=parseChain(raw);chainData=d;const s=computeStrategy(d)
    document.getElementById('commandContent').innerHTML=renderCommand(d,s)
    document.getElementById('warContent').innerHTML=renderWarRoom(d,s)
    document.getElementById('loadingLeft').style.display='none';document.getElementById('commandContent').style.display='block'
    document.getElementById('loadingRight').style.display='none';document.getElementById('warContent').style.display='block'
    const srcLabel = dataSource==='local'?' 🟢 Live (Local)':dataSource==='vercel'?' 🟡 Live (Server)':dataSource==='proxy'?' 🟠 Live (Proxy)':''
    document.getElementById('lastUpdate').textContent='Updated '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+srcLabel
    if(chainData){prevData={strikes:{}};for(const row of d.nearStrikes)prevData.strikes[row.strike]={ce:row.ce?.openInterest||0,pe:row.pe?.openInterest||0}}
  }catch(e){loadDemo()}
  btn.classList.remove('spinning')
}
function loadDemo(){
  const spot=24387,demoRaw=buildDemoData(spot),d=parseChain(demoRaw),s=computeStrategy(d)
  document.getElementById('commandContent').innerHTML=`<div class="warn-box"><strong>⚠ Demo Data</strong> — NSE temporarily unreachable. Showing realistic demo data. Will retry on next 5-min refresh.</div>`+renderCommand(d,s)
  document.getElementById('warContent').innerHTML=renderWarRoom(d,s)
  document.getElementById('loadingLeft').style.display='none';document.getElementById('commandContent').style.display='block'
  document.getElementById('loadingRight').style.display='none';document.getElementById('warContent').style.display='block'
  document.getElementById('lastUpdate').textContent='⚪ Demo Data — start nse-proxy.js for live'
}
function buildDemoData(spot){
  const step=50,base=Math.round(spot/step)*step,data=[],expiry='26-Mar-2026'
  for(let i=-8;i<=8;i++){
    const strike=base+i*step,atmDist=Math.abs(i)
    const ceOI=Math.max(5,Math.round((i>=0?Math.max(8,80-i*10+(i===2?15:0)):Math.max(5,30-atmDist*5))*100000+Math.random()*50000))
    const peOI=Math.max(5,Math.round((i<=0?Math.max(8,80+i*9+(i===-2?18:0)):Math.max(5,30-atmDist*5))*100000+Math.random()*50000))
    const atmIV=14+atmDist*0.8
    data.push({strikePrice:strike,expiryDate:expiry,
      CE:{strikePrice:strike,openInterest:ceOI,changeinOpenInterest:Math.round((Math.random()-0.4)*ceOI*0.1),lastPrice:Math.max(1,Math.round((spot-strike+150+Math.random()*20)*0.7)),impliedVolatility:atmIV+(i>0?0:1.5),totalTradedVolume:Math.round(ceOI*0.3)},
      PE:{strikePrice:strike,openInterest:peOI,changeinOpenInterest:Math.round((Math.random()-0.4)*peOI*0.1),lastPrice:Math.max(1,Math.round((strike-spot+150+Math.random()*20)*0.7)),impliedVolatility:atmIV+(i<0?0:1.2),totalTradedVolume:Math.round(peOI*0.3)}})
  }
  return{records:{data,underlyingValue:spot,expiryDates:[expiry]}}
}
loadData()
setInterval(loadData,5*60*1000)
</script>
