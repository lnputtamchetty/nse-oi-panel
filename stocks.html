// ═══════════════════════════════════════════════════════════════
// PARSE CHAIN
// ═══════════════════════════════════════════════════════════════
function parseChain(raw, sym) {
  const rec = raw.records || raw
  const data = rec.data || [], spot = rec.underlyingValue || 0
  const allExp = rec.expiryDates || [], expiry = allExp[0] || ''
  const info = FNO.find(f=>f.s===sym) || {s:sym,n:sym,lot:500,sec:'—'}
  const strikes = {}
  for (const row of data) {
    if (row.expiryDate !== expiry) continue
    const k = row.strikePrice
    if (!strikes[k]) strikes[k]={strike:k,ce:{},pe:{}}
    if (row.CE) strikes[k].ce = row.CE
    if (row.PE) strikes[k].pe = row.PE
  }
  const list = Object.values(strikes).sort((a,b)=>a.strike-b.strike)
  if (!list.length) return null
  const atm    = list.reduce((b,s)=>Math.abs(s.strike-spot)<Math.abs(b.strike-spot)?s:b,list[0])
  const ceWall = list.reduce((b,s)=>(s.ce.openInterest||0)>(b.ce.openInterest||0)?s:b,list[0])
  const peWall = list.reduce((b,s)=>(s.pe.openInterest||0)>(b.pe.openInterest||0)?s:b,list[0])
  const totCe  = list.reduce((s,r)=>s+(r.ce.openInterest||0),0)
  const totPe  = list.reduce((s,r)=>s+(r.pe.openInterest||0),0)
  const pcr    = totCe>0?totPe/totCe:1
  const atmIV  = ((atm.ce.impliedVolatility||0)+(atm.pe.impliedVolatility||0))/2
  const atmIdx = list.indexOf(atm)
  let maxPain=0,minL=Infinity
  for (const s of list) {
    let loss=0; for (const o of list) {
      if(o.strike<s.strike) loss+=(o.ce.openInterest||0)*(s.strike-o.strike)
      if(o.strike>s.strike) loss+=(o.pe.openInterest||0)*(o.strike-s.strike)
    }
    if(loss<minL){minL=loss;maxPain=s.strike}
  }
  return {sym,spot,expiry,allExpiries:allExp,atm:atm.strike,atmRow:atm,maxPain,
    ceWall,peWall,pcr,totCe,totPe,atmIV,info,
    nearStrikes:list.slice(Math.max(0,atmIdx-5),atmIdx+6),strikeList:list}
}

// ═══════════════════════════════════════════════════════════════
// COMPUTE STRATEGY + SCORE (Natenberg-based)
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
// STRATEGY CHANGE DETECTOR
// Compares current scan to previous — detects what changed
// and generates plain English hedge/exit instructions
// ═══════════════════════════════════════════════════════
function detectStrategyChange(sym, d, s) {
  const hist = stratHistory[sym] || []
  if (hist.length === 0) return null  // first time — no comparison

  const prev = hist[hist.length - 1]
  const curr = {
    name:   s.pri.name,
    dir:    s.dir,
    score:  s.score,
    ceOI:   d.ceWall.ce?.openInterest || 0,
    peOI:   d.peWall.pe?.openInterest || 0,
    pcr:    d.pcr,
    iv:     d.atmIV || 0,
    spot:   d.spot,
    ceW:    d.ceWall.strike,
    peW:    d.peWall.strike,
    ts:     Date.now()
  }

  const changes = []

  // ── DIRECTION FLIP (most critical) ──
  if (prev.dir !== curr.dir && prev.dir !== 'range' && curr.dir !== 'range') {
    const wasDir = prev.dir === 'bull' ? '🟢 Bullish' : '🔴 Bearish'
    const nowDir = curr.dir === 'bull' ? '🟢 Bullish' : curr.dir === 'bear' ? '🔴 Bearish' : '⚪ Neutral'
    const hedge = curr.dir === 'bull'
      ? `Buy 1 ATM CE (₹${d.atm} CE @ ~₹${d.atmRow.ce?.lastPrice?.toFixed(0)||'—'}) to hedge against upside. Exit any bearish positions immediately.`
      : curr.dir === 'bear'
      ? `Buy 1 ATM PE (₹${d.atm} PE @ ~₹${d.atmRow.pe?.lastPrice?.toFixed(0)||'—'}) to hedge against downside. Exit any bullish positions immediately.`
      : `Close directional positions. Market has shifted to range. Consider Iron Condor.`
    changes.push({
      severity: 'critical',
      icon: '🔄',
      title: `DIRECTION FLIP: ${wasDir} → ${nowDir}`,
      detail: `Market structure changed completely. Previous strategy (${prev.name}) may now be working against you.`,
      action: `🛡️ HEDGE NOW: ${hedge}`,
      urgency: 'Act immediately on next refresh confirmation'
    })
  }

  // ── STRATEGY NAME CHANGE (same direction, different strategy) ──
  else if (prev.name !== curr.name) {
    const scoreChg = curr.score - prev.score
    changes.push({
      severity: 'warning',
      icon: '⚠️',
      title: `STRATEGY CHANGED: ${prev.name} → ${curr.name}`,
      detail: `OI structure shifted. Score ${scoreChg >= 0 ? '+' : ''}${scoreChg} (${prev.score} → ${curr.score}).`,
      action: scoreChg < 0
        ? `🛡️ REDUCE SIZE: New strategy has lower conviction. Trade at 50% normal size until confirmed.`
        : `✅ UPGRADE: Strategy improved. New setup has better risk/reward.`,
      urgency: scoreChg < -10 ? 'Act on next refresh' : 'Monitor'
    })
  }

  // ── SCORE DETERIORATION ──
  const scoreDrop = prev.score - curr.score
  if (scoreDrop >= 20 && prev.name === curr.name) {
    changes.push({
      severity: 'warning',
      icon: '📉',
      title: `SCORE DROPPED: ${prev.score} → ${curr.score} (−${scoreDrop} pts)`,
      detail: `OI conditions weakening for ${curr.name}. Confidence falling.`,
      action: `🛡️ REDUCE EXPOSURE: If you are in this trade, reduce to 50% size or place SL at ${Math.round(scoreDrop/20*30)}% of premium paid.`,
      urgency: 'Monitor closely'
    })
  }

  // ── CE WALL WEAKENING (dangerous for bearish trades) ──
  const ceOIDrop = prev.ceOI > 10000 ? (curr.ceOI - prev.ceOI) / prev.ceOI * 100 : 0
  if (ceOIDrop < -20 && (s.dir === 'bear' || s.pri.name.includes('BEAR CALL'))) {
    const step = s.step || 50
    changes.push({
      severity: 'warning',
      icon: '⚡',
      title: `CE WALL WEAKENING: OI dropped ${Math.abs(ceOIDrop).toFixed(0)}%`,
      detail: `The ceiling at ₹${d.ceWall.strike} is losing institutional support. Bears are exiting. SHORT COVERING risk.`,
      action: `🛡️ HEDGE: Buy 1 lot ₹${d.ceWall.strike + step} CE to cap unlimited upside risk on your Bear Call Spread. Or exit 50% of position now.`,
      urgency: 'Act within 1-2 candles'
    })
  }

  // ── PE WALL WEAKENING (dangerous for bullish trades) ──
  const peOIDrop = prev.peOI > 10000 ? (curr.peOI - prev.peOI) / prev.peOI * 100 : 0
  if (peOIDrop < -20 && (s.dir === 'bull' || s.pri.name.includes('BULL PUT'))) {
    const step = s.step || 50
    changes.push({
      severity: 'warning',
      icon: '⚡',
      title: `PE WALL CRACKING: OI dropped ${Math.abs(peOIDrop).toFixed(0)}%`,
      detail: `The floor at ₹${d.peWall.strike} is losing support. Bulls are exiting. BREAKDOWN risk.`,
      action: `🛡️ HEDGE: Buy 1 lot ₹${d.peWall.strike - step} PE to cap downside. Or exit 50% of your Bull Put Spread now.`,
      urgency: 'Act within 1-2 candles'
    })
  }

  // ── IV SPIKE (strategy type becoming wrong) ──
  const ivJump = prev.iv > 0 ? ((curr.iv - prev.iv) / prev.iv * 100) : 0
  if (ivJump >= 30) {
    const isBuying = s.pri.cat === 'bull' || s.pri.cat === 'bear'
    changes.push({
      severity: isBuying ? 'warning' : 'info',
      icon: '🌡️',
      title: `IV SPIKE: ${prev.iv.toFixed(1)}% → ${curr.iv.toFixed(1)}% (+${ivJump.toFixed(0)}%)`,
      detail: `Options got expensive suddenly. ${isBuying ? 'You are BUYING options — IV working against you.' : 'You are SELLING options — IV working FOR you.'}`,
      action: isBuying
        ? `⚠️ If you bought options: premium inflated by IV. Consider SELLING a further OTM option to create a spread and reduce vega exposure. Natenberg: high IV = sell, not buy.`
        : `✅ IV spike BENEFITS your selling strategy. Premium is elevated. Consider adding to position if OI confirms.`,
      urgency: isBuying ? 'Review immediately' : 'Opportunity'
    })
  }

  // ── PCR THRESHOLD CROSSED ──
  const pcrCrossed = (prev.pcr <= 1.0 && curr.pcr > 1.1) || (prev.pcr >= 1.0 && curr.pcr < 0.9)
  if (pcrCrossed) {
    const newBias = curr.pcr > 1.1 ? 'BEARISH (heavy put buying)' : 'BULLISH (heavy call buying)'
    changes.push({
      severity: 'warning',
      icon: '⚖️',
      title: `PCR SHIFTED: ${prev.pcr.toFixed(2)} → ${curr.pcr.toFixed(2)} (now ${newBias})`,
      detail: `Market sentiment changed. Institutional positioning is flipping direction.`,
      action: `Monitor for 1 more refresh. If PCR holds new level, adjust strategy direction accordingly.`,
      urgency: 'Monitor'
    })
  }

  // ── SPOT CROSSING A WALL ──
  const prevAboveCe = prev.spot >= prev.ceW, currAboveCe = curr.spot >= curr.ceW
  const prevBelowPe = prev.spot <= prev.peW, currBelowPe = curr.spot <= curr.peW
  if (!prevAboveCe && currAboveCe) {
    changes.push({
      severity: 'critical',
      icon: '🚨',
      title: `BREAKOUT: Spot crossed CE wall ₹${d.ceWall.strike}!`,
      detail: `Price moved ABOVE the resistance wall. All bearish strategies are now at maximum risk.`,
      action: `🚨 EXIT ALL BEARISH POSITIONS NOW. If in Bear Call Spread: buy back the sold CE immediately. Loss of ₹${Math.round((curr.ceW-curr.spot)*25)} per lot — take it, don't let it grow.`,
      urgency: 'ACT IMMEDIATELY'
    })
  }
  if (!prevBelowPe && currBelowPe) {
    changes.push({
      severity: 'critical',
      icon: '🚨',
      title: `BREAKDOWN: Spot crossed PE wall ₹${d.peWall.strike}!`,
      detail: `Price moved BELOW the support floor. All bullish strategies are now at maximum risk.`,
      action: `🚨 EXIT ALL BULLISH POSITIONS NOW. If in Bull Put Spread: buy back the sold PE immediately. Take the loss now — don't average.`,
      urgency: 'ACT IMMEDIATELY'
    })
  }

  return changes.length > 0 ? changes : null
}

// ═══════════════════════════════════════════════════════
// PERSISTENCE TRACKER — how many refreshes same strategy?
// ═══════════════════════════════════════════════════════
function getPersistence(sym, currentStratName, currentDir) {
  const hist = stratHistory[sym] || []
  if (hist.length === 0) return {count:1, multiplier:0.8, label:'1st scan', bars:1, confirmed:false}

  let streak = 0
  for (let i = hist.length - 1; i >= 0; i--) {
    if (hist[i].name === currentStratName && hist[i].dir === currentDir) streak++
    else break
  }
  streak++ // count current

  const multiplier = streak <= 1 ? 0.8 : streak === 2 ? 0.9 : streak === 3 ? 1.0 : streak === 4 ? 1.1 : 1.15
  const label      = streak === 1 ? '1st scan — unconfirmed' : streak === 2 ? '2nd scan — building' : streak === 3 ? '3rd scan — CONFIRMED ✅' : streak === 4 ? '4th scan — Strong conviction' : `${streak} scans — MAX CONVICTION 🏆`
  const confirmed  = streak >= 3
  return {count:streak, multiplier, label, bars:Math.min(5,streak), confirmed}
}

// Update history after each scan
function updateStratHistory(sym, d, s) {
  if (!stratHistory[sym]) stratHistory[sym] = []
  stratHistory[sym].push({
    name:  s.pri.name,
    dir:   s.dir,
    score: s.score,
    ceOI:  d.ceWall.ce?.openInterest || 0,
    peOI:  d.peWall.pe?.openInterest || 0,
    pcr:   d.pcr,
    iv:    d.atmIV || 0,
    spot:  d.spot,
    ceW:   d.ceWall.strike,
    peW:   d.peWall.strike,
    ts:    Date.now()
  })
  // Keep last 10 entries per stock
  if (stratHistory[sym].length > 10) stratHistory[sym].shift()
}

function computeStrategy(d) {
  const {spot,ceWall,peWall,maxPain,pcr,atmRow,atmIV} = d
  const lot  = d.info.lot
  const step = ceWall.strike>5000?100:ceWall.strike>2000?50:ceWall.strike>500?20:10
  const dte  = getDTE(d.expiry)
  const dCe  = ceWall.strike-spot, dPe=spot-peWall.strike
  const inR  = spot>peWall.strike&&spot<ceWall.strike
  const ivHigh=35, ivLow=18
  const ivState = atmIV>ivHigh?'HIGH':atmIV<ivLow?'LOW':'NORMAL'
  const ivAction = ivState==='HIGH'
    ? `IV ${atmIV.toFixed(1)}% HIGH — sell premium. Iron Condor/Straddle Sell.`
    : ivState==='LOW'
    ? `IV ${atmIV.toFixed(1)}% LOW — buy premium. Buy CE/PE or debit spread.`
    : `IV ${atmIV.toFixed(1)}% normal — spreads ideal. Follow OI direction.`

  let bull=0,bear=0
  if(pcr>1.2)bear+=2; else if(pcr>1.0)bear+=1; else if(pcr<0.8)bull+=2; else if(pcr<1.0)bull+=1
  if(dCe<step*2)bear+=2; else if(dCe<step*4)bear+=1
  if(dPe<step*2)bull+=2
  if(spot>maxPain)bear+=1; else bull+=1

  let dir='range', bias='NEUTRAL', sig='neu'
  if(!inR&&spot>=ceWall.strike){dir='bull';bias='BREAKOUT';sig='bull'}
  else if(!inR&&spot<=peWall.strike){dir='bear';bias='BREAKDOWN';sig='bear'}
  else if(bull>bear+1){dir='bull';bias='BULLISH';sig='bull'}
  else if(bear>bull+1){dir='bear';bias='BEARISH';sig='bear'}
  else if(dCe<step*3||dPe<step*3){sig='warn';bias='NEAR WALL'}

  const aCe=atmRow.ce?.lastPrice||0, aPe=atmRow.pe?.lastPrice||0
  const cW=ceWall.ce?.lastPrice||0, pW=peWall.pe?.lastPrice||0

  // Primary options strategy
  let pri={}
  if(dir==='bull'){pri={name:'BUY ATM CE',type:'Directional Bull',cat:'bull',legs:[{a:'BUY',d:`${d.atm} CE`,p:aCe.toFixed(1)}],risk:Math.round(aCe*lot),rew:Math.round(aCe*lot*2),rr:'1:2',when:'CE wall broken + volume up',avoid:'IV>30% — overpaying',exit:`2x premium OR spot below ${peWall.strike}`}}
  else if(dir==='bear'){pri={name:'BUY ATM PE',type:'Directional Bear',cat:'bear',legs:[{a:'BUY',d:`${d.atm} PE`,p:aPe.toFixed(1)}],risk:Math.round(aPe*lot),rew:Math.round(aPe*lot*2),rr:'1:2',when:'PE wall broken + volume down',avoid:'High IV — buy spread instead',exit:`2x premium OR spot above ${ceWall.strike}`}}
  else if(dCe<step*3){const hb=d.strikeList.find(s=>s.strike===ceWall.strike+step)?.ce?.lastPrice||0;pri={name:'BEAR CALL SPREAD',type:'Sell Resistance',cat:'sell',legs:[{a:'SELL',d:`${ceWall.strike} CE`,p:cW.toFixed(1)},{a:'BUY',d:`${ceWall.strike+step} CE`,p:hb.toFixed(1)}],risk:Math.round((step-Math.max(0,cW-hb))*lot),rew:Math.round(Math.max(0,cW-hb)*lot),rr:`1:${(Math.max(0,cW-hb)/Math.max(1,step-Math.max(0,cW-hb))).toFixed(2)}`,when:`Spot near CE wall. PCR balanced or bear.`,avoid:'Earnings week',exit:`CE breaks ${ceWall.strike+step}`}}
  else if(dPe<step*3){const hb=d.strikeList.find(s=>s.strike===peWall.strike-step)?.pe?.lastPrice||0;pri={name:'BULL PUT SPREAD',type:'Sell Support',cat:'sell',legs:[{a:'SELL',d:`${peWall.strike} PE`,p:pW.toFixed(1)},{a:'BUY',d:`${peWall.strike-step} PE`,p:hb.toFixed(1)}],risk:Math.round((step-Math.max(0,pW-hb))*lot),rew:Math.round(Math.max(0,pW-hb)*lot),rr:`1:${(Math.max(0,pW-hb)/Math.max(1,step-Math.max(0,pW-hb))).toFixed(2)}`,when:`Spot near PE wall. PCR balanced or bull.`,avoid:'Earnings week',exit:`PE breaks ${peWall.strike-step}`}}
  else{pri={name:'IRON CONDOR',type:'Range Bound',cat:'sell',legs:[{a:'SELL',d:`${ceWall.strike} CE`,p:cW.toFixed(1)},{a:'BUY',d:`${ceWall.strike+step} CE`,p:'hedge'},{a:'SELL',d:`${peWall.strike} PE`,p:pW.toFixed(1)},{a:'BUY',d:`${peWall.strike-step} PE`,p:'hedge'}],risk:step*lot,rew:Math.round((cW+pW)*lot),rr:`1:${((cW+pW)/Math.max(1,step)).toFixed(2)}`,when:'Both walls intact. Early week.',avoid:'Quarterly results',exit:`Break above ${ceWall.strike} or below ${peWall.strike}`}}

  // Alt options
  let alt={}
  if(dir==='bull'){alt={name:'BULL CALL SPREAD',type:'Defined Bull',cat:'bull',legs:[{a:'BUY',d:`${d.atm} CE`,p:aCe.toFixed(1)},{a:'SELL',d:`${ceWall.strike} CE`,p:cW.toFixed(1)}],risk:Math.round(Math.max(0,aCe-cW)*lot),rew:Math.round((ceWall.strike-d.atm-Math.max(0,aCe-cW))*lot),rr:'Defined',when:'Bullish, want defined risk',avoid:'Very tight spread',exit:'CE wall breaks up'}}
  else if(dir==='bear'){alt={name:'BEAR PUT SPREAD',type:'Defined Bear',cat:'bear',legs:[{a:'BUY',d:`${d.atm} PE`,p:aPe.toFixed(1)},{a:'SELL',d:`${peWall.strike} PE`,p:pW.toFixed(1)}],risk:Math.round(Math.max(0,aPe-pW)*lot),rew:Math.round((d.atm-peWall.strike-Math.max(0,aPe-pW))*lot),rr:'Defined',when:'Bearish, want defined risk',avoid:'Very tight spread',exit:'PE wall breaks down'}}
  else{alt={name:'STRADDLE SELL',type:'High IV Neutral',cat:'sell',legs:[{a:'SELL',d:`${d.atm} CE`,p:aCe.toFixed(1)},{a:'SELL',d:`${d.atm} PE`,p:aPe.toFixed(1)}],risk:step*2*lot,rew:Math.round((aCe+aPe)*lot),rr:`1:${((aCe+aPe)/(step*2)).toFixed(2)}`,when:'IV high + market range bound',avoid:'Before results',exit:`Move >${step}pts from ATM`}}

  // Futures
  let fut={}
  if(dir==='bull'||(dir==='range'&&bull>=bear)){fut={name:'BUY FUTURES',type:'Futures Long',cat:'fut',legs:[{a:'BUY',d:`${d.sym} Fut (${lot} sh)`,p:`~₹${Math.round(spot)}`}],risk:Math.round(step*2*lot),rew:Math.round(step*3*lot),rr:'1:1.5',entry:`Buy above ₹${Math.round(spot+step*0.5)}`,sl:`SL: ₹${peWall.strike}`,target:`Target: ₹${ceWall.strike} = ₹${Math.round((ceWall.strike-spot)*lot).toLocaleString('en-IN')} per lot`}}
  else{fut={name:'SELL FUTURES',type:'Futures Short',cat:'fut',legs:[{a:'SELL',d:`${d.sym} Fut (${lot} sh)`,p:`~₹${Math.round(spot)}`}],risk:Math.round(step*2*lot),rew:Math.round(step*3*lot),rr:'1:1.5',entry:`Sell below ₹${Math.round(spot-step*0.5)}`,sl:`SL: ₹${ceWall.strike}`,target:`Target: ₹${peWall.strike} = ₹${Math.round((spot-peWall.strike)*lot).toLocaleString('en-IN')} per lot`}}

  // ── WHALE ALERT — OI spike > 30% in one session = institutional entry ──
  const maxOISpike = d.nearStrikes.reduce((max, row) => {
    const prev = prevSnaps[d.sym]
    if (!prev) return max
    const ceOI = row.ce?.openInterest||0, peOI = row.pe?.openInterest||0
    const prevCe = prev[row.strike]?.ce||ceOI, prevPe = prev[row.strike]?.pe||peOI
    const cePct = prevCe>10000?Math.abs((ceOI-prevCe)/prevCe*100):0
    const pePct = prevPe>10000?Math.abs((peOI-prevPe)/prevPe*100):0
    return Math.max(max, cePct, pePct)
  }, 0)
  const isWhaleAlert = maxOISpike >= 30

  // Short covering: wall OI dropping = squeeze coming
  const ceWallOI    = ceWall.ce?.openInterest||0
  const peWallOI    = peWall.pe?.openInterest||0
  const prevCeWall  = prevSnaps[d.sym]?.[ceWall.strike]?.ce || ceWallOI
  const prevPeWall  = prevSnaps[d.sym]?.[peWall.strike]?.pe || peWallOI
  const ceWallDrop  = prevCeWall>10000?(ceWallOI-prevCeWall)/prevCeWall*100:0
  const peWallDrop  = prevPeWall>10000?(peWallOI-prevPeWall)/prevPeWall*100:0
  const ceSqueezing = ceWallDrop < -15  // CE wall losing OI = ceiling breaking = BULL SQUEEZE
  const peSqueezing = peWallDrop < -15  // PE wall losing OI = floor breaking = BEAR SQUEEZE

  // ── SCORE (0-100) — Natenberg + OI factors ──
  let score = 0, reasons = []

  // 1. Wall strength (25pts)
  const wallOI = Math.max((ceWall.ce?.openInterest||0),(peWall.pe?.openInterest||0))/100000
  if(wallOI>100){score+=25;reasons.push(`Wall OI ${wallOI.toFixed(0)}L — very strong (25/25)`)}
  else if(wallOI>50){score+=18;reasons.push(`Wall OI ${wallOI.toFixed(0)}L — strong (18/25)`)}
  else if(wallOI>20){score+=10;reasons.push(`Wall OI ${wallOI.toFixed(0)}L — moderate (10/25)`)}
  else{score+=4;reasons.push(`Wall OI ${wallOI.toFixed(0)}L — weak (4/25)`)}

  // 2. PCR confirmation (20pts)
  if((dir==='bull'&&pcr<0.9)||(dir==='bear'&&pcr>1.1)){score+=20;reasons.push(`PCR ${pcr.toFixed(2)} confirms direction (20/20)`)}
  else if((dir==='bull'&&pcr<1.0)||(dir==='bear'&&pcr>1.0)){score+=12;reasons.push(`PCR ${pcr.toFixed(2)} mildly confirms (12/20)`)}
  else if(dir==='range'){score+=12;reasons.push(`PCR ${pcr.toFixed(2)} neutral — range trade ok (12/20)`)}
  else{score+=4;reasons.push(`PCR ${pcr.toFixed(2)} contradicts direction (4/20)`)}

  // 3. IV suitability — Natenberg (20pts)
  const isBuying = pri.cat==='bull'||pri.cat==='bear'
  if((isBuying&&ivState==='LOW')||(!isBuying&&ivState==='HIGH')){score+=20;reasons.push(`IV ${ivState} — perfect for ${isBuying?'buying':'selling'} (20/20)`)}
  else if(ivState==='NORMAL'){score+=13;reasons.push(`IV NORMAL — strategy valid (13/20)`)}
  else{score+=5;reasons.push(`IV ${ivState} — against strategy type (5/20)`)}

  // 4. Wall proximity — is spot near a wall? (20pts)
  const minDist = Math.min(dCe, dPe)
  if(minDist<step*2){score+=20;reasons.push(`Spot ${minDist}pts from wall — at decision point (20/20)`)}
  else if(minDist<step*4){score+=13;reasons.push(`Spot ${minDist}pts from wall — approaching (13/20)`)}
  else{score+=5;reasons.push(`Spot ${minDist}pts from wall — no urgency (5/20)`)}

  // 5. DTE suitability (15pts)
  if(dte>=3&&dte<=7&&pri.cat==='sell'){score+=15;reasons.push(`${dte}D expiry — ideal for selling (15/15)`)}
  else if(dte>=2&&pri.cat!=='sell'){score+=15;reasons.push(`${dte}D expiry — ok for buying (15/15)`)}
  else if(dte===1){score+=8;reasons.push(`1D to expiry — risky, size down (8/15)`)}
  else if(dte===0){score+=3;reasons.push(`Expiry day — straddle/strangle only (3/15)`)}
  else{score+=10;reasons.push(`${dte}D expiry — acceptable (10/15)`)}

  // Bonus points for whale activity and squeeze
  if (isWhaleAlert) { score = Math.min(100, score+12); reasons.push(`🐋 WHALE ALERT — OI spike ${maxOISpike.toFixed(0)}% = institutional entry (+12)`) }
  if (ceSqueezing && dir==='bull') { score = Math.min(100, score+15); reasons.push(`⚡ CE WALL SQUEEZING — ceiling breaking = explosive upside (+15)`) }
  if (peSqueezing && dir==='bear') { score = Math.min(100, score+15); reasons.push(`⚡ PE WALL SQUEEZING — floor breaking = explosive downside (+15)`) }

  const grade = score>=80?'A':score>=60?'B':score>=40?'C':'D'
  const activity = Math.abs(bull-bear)*20+(minDist<step*3?30:0)+(Math.abs(pcr-1)>0.3?20:0)+(dte<=2?15:0)

  return {dir,bias,sig,score,grade,reasons,activity,bull,bear,dte,pri,alt,fut,atmIV,ivState,ivAction,step,dCe,dPe,isWhaleAlert,ceSqueezing,peSqueezing}
}

// SCAN ENGINE
// ═══════════════════════════════════════════════════════════════
async function startScan() {
  if (isScanning) return
  isScanning = true
  allTrades = []
  pulseData = {ce:[],pe:[],sc:[],nw:[],pcr:[]}
  const btn = document.getElementById('scanBtn')
  btn.classList.add('spinning')
  document.getElementById('scanProg').style.display = 'flex'
  document.getElementById('luEl').textContent = 'Scanning...'
  document.getElementById('tradeCards').innerHTML = '<div class="loading-state"><div class="ring"></div><span class="scanning">Scanning stocks — building your trade list...</span></div>'

  const syms = [...watchlist]
  for (let i=0; i<syms.length; i++) {
    const sym = syms[i]
    document.getElementById('scanLbl').textContent = `${sym} (${i+1}/${syms.length})`
    document.getElementById('progFill').style.width = `${Math.round(((i+1)/syms.length)*100)}%`

    try {
      const raw = await fetchChain(sym)
      let d, isDemo = false
      if (raw) { d = parseChain(raw, sym); if (!d) { d=buildDemo(sym); isDemo=true } }
      else { d=buildDemo(sym); isDemo=true }
      const s = computeStrategy(d)
      const changeReport = detectStrategyChange(sym, d, s)
      const persistence  = getPersistence(sym, s.pri.name, s.dir)
      // Apply persistence multiplier to score
      const adjScore = Math.min(100, Math.round(s.score * persistence.multiplier))
      s.adjScore     = adjScore
      s.persistence  = persistence
      s.changeReport = changeReport
      updateStratHistory(sym, d, s)
      scanResults[sym] = {d,s,isDemo,ts:Date.now()}
      // Build trade entries
      allTrades.push({sym,d,s,strat:s.pri,isDemo})
      // Also add futures if high score
      if (s.score >= 60) allTrades.push({sym,d,s,strat:s.fut,isFut:true,score:s.score-10,isDemo})
      // Update pulse
      updatePulse(sym, d, s)
      checkAlerts(sym, d, s)
      prevSnaps[sym] = buildSnap(d)
    } catch(e) {
      const d=buildDemo(sym), s=computeStrategy(d)
      scanResults[sym]={d,s,isDemo:true,ts:Date.now()}
      allTrades.push({sym,d,s,strat:s.pri,isDemo:true})
    }

    // Render progressively as each stock loads
    renderTrades()
    renderPulse()
    await sleep(600)
  }

  isScanning = false
  btn.classList.remove('spinning')
  document.getElementById('scanProg').style.display = 'none'
  document.getElementById('luEl').textContent = 'Updated '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})
  renderTrades()
  renderPulse()
  renderTicker()
  resetCD()
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function buildSnap(d){const o={};d.nearStrikes.forEach(r=>o[r.strike]={ce:r.ce?.openInterest||0,pe:r.pe?.openInterest||0});return o}

// ═══════════════════════════════════════════════════════════════
// UPDATE PULSE PANELS
// ═══════════════════════════════════════════════════════════════
function updatePulse(sym, d, s) {
  const snap = prevSnaps[sym]
  const al = getAS()
  const thresh = al.oiT||15, wallT = al.wT||30

  if (snap) {
    d.nearStrikes.forEach(row => {
      const prev=snap[row.strike]; if(!prev) return
      const ceOI=row.ce?.openInterest||0, peOI=row.pe?.openInterest||0
      const cePct=prev.ce>10000?(ceOI-prev.ce)/prev.ce*100:0
      const pePct=prev.pe>10000?(peOI-prev.pe)/prev.pe*100:0
      const ceDiff=ceOI-prev.ce, peDiff=peOI-prev.pe
      if(cePct>=thresh&&ceOI>10000) pulseData.ce.push({sym,strike:row.strike,pct:cePct,oi:(ceOI/100000).toFixed(1)})
      if(pePct>=thresh&&peOI>10000) pulseData.pe.push({sym,strike:row.strike,pct:pePct,oi:(peOI/100000).toFixed(1)})
      if(ceDiff<-20000&&(row.ce?.lastPrice||0)>0) pulseData.sc.push({sym,strike:row.strike,side:'CE',pct:Math.abs(cePct)})
      if(peDiff<-20000&&(row.pe?.lastPrice||0)>0) pulseData.sc.push({sym,strike:row.strike,side:'PE',pct:Math.abs(pePct)})
    })
  } else {
    // First scan — show current wall structure
    if((d.ceWall.ce?.openInterest||0)>50000) pulseData.ce.push({sym,strike:d.ceWall.strike,pct:0,oi:((d.ceWall.ce?.openInterest||0)/100000).toFixed(1),isFirst:true})
    if((d.peWall.pe?.openInterest||0)>50000) pulseData.pe.push({sym,strike:d.peWall.strike,pct:0,oi:((d.peWall.pe?.openInterest||0)/100000).toFixed(1),isFirst:true})
  }
  if(s.dCe>=0&&s.dCe<=wallT*3) pulseData.nw.push({sym,dist:s.dCe,side:'CE',strike:d.ceWall.strike})
  if(s.dPe>=0&&s.dPe<=wallT*3) pulseData.nw.push({sym,dist:s.dPe,side:'PE',strike:d.peWall.strike})
  if(d.pcr>1.5||d.pcr<0.6) pulseData.pcr.push({sym,pcr:d.pcr,dir:d.pcr>1.5?'bear':'bull'})
}

function setF(f, el) {
  activeFilter = f
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on','green','red','purple'))
  el.classList.add('on')
  if(f==='bull') el.classList.add('green')
  else if(f==='bear') el.classList.add('red')
  else if(f==='sell'||f==='fut') el.classList.add('purple')
  renderTrades()
}

  if (activeFilter === 'bull') trades = trades.filter(t=>t.strat?.cat==='bull')
  else if (activeFilter === 'bear') trades = trades.filter(t=>t.strat?.cat==='bear')
  else if (activeFilter === 'sell') trades = trades.filter(t=>t.strat?.cat==='sell')
  else if (activeFilter === 'fut') trades = trades.filter(t=>t.isFut)

// ═══════════════════════════════════════════════════════════════
// RENDER PULSE PANELS
// ═══════════════════════════════════════════════════════════════
function renderPulse() {
  pulseData.ce.sort((a,b)=>(b.pct||parseFloat(b.oi)||0)-(a.pct||parseFloat(a.oi)||0))
  pulseData.pe.sort((a,b)=>(b.pct||parseFloat(b.oi)||0)-(a.pct||parseFloat(a.oi)||0))
  pulseData.sc.sort((a,b)=>b.pct-a.pct)
  pulseData.nw.sort((a,b)=>a.dist-b.dist)

  const pItem = (x, onClick) => `<div class="pulse-item" onclick="${onClick}('${x.sym}')">
    <span class="pi-sym">${x.sym}</span>
    <span class="pi-detail">${x.strike?`₹${x.strike}`:'—'}</span>
    <span class="pi-val">${x.isFirst?`${x.oi}L`:x.pct?`+${x.pct.toFixed(0)}%`:x.dist?`${x.dist}pts`:x.pcr?x.pcr.toFixed(2):'—'}</span>
  </div>`

  const set = (bodyId, cntId, items, fn) => {
    document.getElementById(bodyId).innerHTML = items.length
      ? items.slice(0,6).map(x=>pItem(x,fn)).join('')
      : '<div class="pulse-empty">None detected — data updates on refresh</div>'
    document.getElementById(cntId).textContent = items.length
  }

  set('bodyCE','cntCE',pulseData.ce,'selectTrade')
  set('bodyPE','cntPE',pulseData.pe,'selectTrade')
  set('bodySC','cntSC',pulseData.sc,'selectTrade')
  set('bodyNW','cntNW',pulseData.nw,'selectTrade')

  const pcrItems = pulseData.pcr.map(x=>({...x, strike:null, pct:null, oi:null, pcr:x.pcr, dist:null}))
  set('bodyPCR','cntPCR',pcrItems,'selectTrade')

  // Sector heatmap
  const sectors = {}
  Object.values(scanResults).forEach(({d,s}) => {
    const sec = d.info?.sec || '—'
    if (!sectors[sec]) sectors[sec] = {bull:0,bear:0,count:0,pcrs:[]}
    sectors[sec].count++
    sectors[sec].pcrs.push(d.pcr)
    if (s.dir==='bull') sectors[sec].bull++
    else if (s.dir==='bear') sectors[sec].bear++
  })
  const sectorEl = document.getElementById('bodySector')
  if (sectorEl) {
    const sEntries = Object.entries(sectors).filter(([,v])=>v.count>0).sort((a,b)=>b[1].count-a[1].count).slice(0,8)
    sectorEl.innerHTML = sEntries.length ? sEntries.map(([sec,v]) => {
      const avgPCR = v.pcrs.reduce((a,b)=>a+b,0)/v.pcrs.length
      const bull = v.bull/v.count, bear = v.bear/v.count
      const signal = bull>0.5?'bull':bear>0.5?'bear':'neu'
      const sColor = signal==='bull'?'var(--green)':signal==='bear'?'var(--red)':'var(--text3)'
      const sBg    = signal==='bull'?'var(--green-bg)':signal==='bear'?'var(--red-bg)':'var(--bg3)'
      const sBd    = signal==='bull'?'var(--green-bd)':signal==='bear'?'var(--red-bd)':'var(--border)'
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 6px;border-radius:7px;background:${sBg};border:1px solid ${sBd};margin-bottom:4px;cursor:pointer" onclick="setF('${signal==='bull'?'bull':signal==='bear'?'bear':'all'}',document.querySelector('.fchip'))">
        <div style="font-size:11px;font-weight:700;color:${sColor}">${sec}</div>
        <div style="display:flex;align-items:center;gap:5px">
          <span style="font-size:10px;color:var(--text3)">PCR ${avgPCR.toFixed(2)}</span>
          <span style="font-size:10px;font-weight:700;color:${sColor}">${signal==='bull'?'🟢':signal==='bear'?'🔴':'⚪'}</span>
        </div>
      </div>`
    }).join('') : '<div class="pulse-empty">Scan to see sector breakdown</div>'
  }
}

  pulseData.nw.slice(0,2).forEach(x => chips.push({type:'warn',msg:`🎯 ${x.sym} only ${x.dist}pts from ${x.side} wall ₹${x.strike}`}))
  chips.push({type:'info',msg:'📖 Score 80+ = A-Grade trade — all 5 factors aligned. Click any card for full chain.'})
  if (!chips.length) return
  const html = chips.map(c=>`<span class="chip ${c.type}">${c.msg}</span>`).join('')
  el.innerHTML = html+html
  const dur = Math.max(20, chips.reduce((s,c)=>s+c.msg.length,0)*0.18)
  el.style.animation = `tick ${dur}s linear infinite`
}

// ALERTS
// ═══════════════════════════════════════════════════════════════
function checkAlerts(sym, d, s) {
  const al = getAS()
  const now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})
  if (al.sig) {
    const prev = prevSigs[sym]
    if (prev && prev !== s.sig && s.sig !== 'neu') {
      fire({type:s.sig==='bull'?'bull':'bear', msg:`🔄 ${sym} signal: ${prev.toUpperCase()} → ${s.sig.toUpperCase()}`, sym, time:now})
    }
    prevSigs[sym] = s.sig
  }
  if (al.wall) {
    const wT = al.wT||30
    if(s.dCe>=0&&s.dCe<=wT) fire({type:'warn',msg:`🎯 ${sym} only ${s.dCe}pts from CE wall ₹${d.ceWall.strike}`,sym,time:now})
    if(s.dPe>=0&&s.dPe<=wT) fire({type:'bull',msg:`🎯 ${sym} only ${s.dPe}pts from PE wall ₹${d.peWall.strike}`,sym,time:now})
  }
  // Fire on critical strategy changes
  if (s.changeReport) {
    s.changeReport.forEach(cr => {
      if (cr.severity === 'critical') {
        fire({type:'spike',msg:`🚨 ${sym}: ${cr.title}`,detail:cr.action,sym,time:now})
      } else if (cr.severity === 'warning' && al.sig) {
        fire({type:'warn',msg:`⚠️ ${sym}: ${cr.title}`,detail:cr.action,sym,time:now})
      }
    })
  }
}

function fire(al) {
  const as = getAS()
  alertHistory.unshift(al); if(alertHistory.length>25) alertHistory.pop()
  alertUnseen++; updateBadge()
  if (as.snd) playSound(al.type==='spike'?'high':'medium')
  if (as.pop) showToast(al)
  if (as.tg) sendTG(al)
  if (document.getElementById('alertOverlay').classList.contains('open')) renderAlertHist()
}

function playSound(sev='medium') {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)()
    const pats={high:[[880,0.15],[660,0.1],[880,0.2]],medium:[[660,0.15],[440,0.15]],low:[[440,0.1]]}
    const notes=pats[sev]||pats.medium; let t=ctx.currentTime
    notes.forEach(([f,dur])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur+0.02);t+=dur+0.05})
  } catch(e){}
}

let _tid=0
function showToast(al) {
  const id='t'+(++_tid)
  const cols={spike:'#ef4444',warn:'#f59e0b',bull:'#22c55e',bear:'#ef4444',info:'#3b82f6'}
  const c=cols[al.type]||'#ef4444'
  const el=document.createElement('div')
  el.id=id; el.className='toast'; el.style.setProperty('--tc',c)
  el.innerHTML=`<button class="tdismiss" onclick="this.parentElement.remove()">✕</button>
    <div class="toast-type">${al.type?.toUpperCase()||'ALERT'} · ${al.sym||''} · ${al.time||''}</div>
    <div class="toast-msg">${al.msg||''}</div>
    <div class="toast-actions"><button class="tbtn" onclick="document.getElementById('${id}').remove()">Dismiss</button></div>`
  document.getElementById('toastWrap').appendChild(el)
  setTimeout(()=>{const e=document.getElementById(id);if(e){e.style.animation='tOut 0.3s forwards';setTimeout(()=>e.remove(),300)}},9000)
}

async function sendTG(al) {
  const tok=localStorage.getItem(TG_TOKEN),chat=localStorage.getItem(TG_CHAT)
  if(!tok||!chat)return

  const q=val.toUpperCase()

function importPaste(){
  const raw=document.getElementById('pasteTA')?.value||''
  const tokens=raw.replace(/[\n\r\t|;,]+/g,' ').split(' ').map(t=>t.trim().toUpperCase()).filter(t=>t.length>=2&&t.length<=20&&/[A-Z]/.test(t)&&!/^(SYMBOL|STOCK|NAME|NO|SR|DATE|PRICE|CLOSE|OPEN|HIGH|LOW|VOLUME|CHANGE|PCT)$/.test(t))
  const matched=tokens.filter(t=>FNO.find(f=>f.s===t))
  let added=0; matched.forEach(s=>{if(!watchlist.includes(s)&&watchlist.length<20){watchlist.push(s);added++}})
  const res=document.getElementById('pasteRes')
  if(matched.length>0){res.innerHTML=`<span style="color:var(--green);font-weight:700">✅ Added ${added}: ${matched.join(', ')}</span>`}
  else{res.innerHTML='<span style="color:var(--red)">No F&O stocks found — check symbols</span>'}
  document.getElementById('pasteTA').value=''
  renderWLChips()
}

// DEMO DATA
// ═══════════════════════════════════════════════════════════════
function buildDemo(sym) {
  const info=FNO.find(f=>f.s===sym)||{s:sym,n:sym,lot:500,sec:'—'}
  const spots={RELIANCE:2980,TCS:3850,HDFCBANK:1720,INFY:1890,ICICIBANK:1280,SBIN:845,AXISBANK:1190,BAJFINANCE:7200,WIPRO:520,TATAMOTORS:995,SUNPHARMA:1890,LT:3650,ZOMATO:245,HAL:4200,BEL:295,DIXON:16500,NTPC:375,ONGC:285,BHARTIARTL:1850,ADANIENT:2850,JSWENERGY:680,RVNL:480,HCLTECH:1650,KOTAKBANK:1980}
  const spot=spots[sym]||1500
  const step=spot>5000?100:spot>2000?50:spot>500?20:10
  const base=Math.round(spot/step)*step
  const MN=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC']
  function lThu(yr,mo){const d=new Date(yr,mo+1,0);while(d.getDay()!==4)d.setDate(d.getDate()-1);return `${String(d.getDate()).padStart(2,'0')}-${MN[d.getMonth()]}-${d.getFullYear()}`}
  const now=new Date(),exps=[]
  for(let m=0;m<4;m++){const mo=(now.getMonth()+m)%12,yr=now.getFullYear()+Math.floor((now.getMonth()+m)/12);exps.push(lThu(yr,mo))}
  const expiry=exps[0],rows=[]
  for(let i=-5;i<=5;i++){
    const st=base+i*step,ab=Math.abs(i)
    const ceOI=Math.max(5,Math.round((i>=0?Math.max(8,50-i*7):Math.max(5,20-ab*4))*10000+Math.random()*5000))
    const peOI=Math.max(5,Math.round((i<=0?Math.max(8,50+i*7):Math.max(5,20-ab*4))*10000+Math.random()*5000))
    rows.push({strikePrice:st,expiryDate:expiry,
      CE:{strikePrice:st,openInterest:ceOI,lastPrice:Math.max(1,Math.round((spot-st+step*2)*0.6)),impliedVolatility:18+ab*1.2},
      PE:{strikePrice:st,openInterest:peOI,lastPrice:Math.max(1,Math.round((st-spot+step*2)*0.6)),impliedVolatility:19+ab*1.0}
    })
  }
  return parseChain({records:{data:rows,underlyingValue:spot,expiryDates:exps}},sym)
}

function getDTE(exp){
  try{const p=exp.split('-'),m={JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11},mm=m[p[1].toUpperCase()];if(mm===undefined)return 5;const d=new Date(parseInt(p[2]),mm,parseInt(p[0])),t=new Date();t.setHours(0,0,0,0);return Math.max(0,Math.round((d-t)/86400000))}catch(e){return 5}
}

function resetCD(){if(cdInt)clearInterval(cdInt);cdSec=120;updCD();cdInt=setInterval(()=>{cdSec--;if(cdSec<=0)cdSec=0;updCD()},1000)}
