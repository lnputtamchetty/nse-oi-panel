<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LNP KAMAKSHIVA · Stock F&O Command Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f0f2f5;--border:#e2e6ed;
  --text:#1a1f2e;--text2:#4a5568;--text3:#8899b0;
  --red:#c0392b;--red-bg:#fdf2f1;--red-bd:#f5c6c0;
  --green:#1a7a50;--green-bg:#f0faf5;--green-bd:#a8e6c8;
  --blue:#1d4ed8;--blue-bg:#eff6ff;--blue-bd:#bfdbfe;
  --yellow:#b45309;--yel-bg:#fffbeb;--yel-bd:#fde68a;
  --purple:#6d28d9;--pur-bg:#f5f3ff;--pur-bd:#ddd6fe;
  --teal:#0e7490;--teal-bg:#ecfeff;--teal-bd:#a5f3fc;
  --orange:#c2410c;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#0c1222 0%,#172040 50%,#1a3a9e 100%);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.4)}
.hrow1{padding:0 16px;height:46px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.07)}
.hrow2{padding:4px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo{background:linear-gradient(135deg,#f59e0b,#ef4444);color:white;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:800;padding:5px 10px;border-radius:7px;letter-spacing:2px;flex-shrink:0}
.htitle{display:flex;flex-direction:column;gap:1px}
.htitle-main{font-size:15px;font-weight:800;color:white;letter-spacing:-0.3px}
.htitle-main .k{color:#f59e0b}.htitle-main .d{color:rgba(255,255,255,0.3);margin:0 5px}.htitle-main .o{color:#60a5fa}
.htitle-sub{font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:2px}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-link{font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7);cursor:pointer;text-decoration:none;transition:all 0.15s;white-space:nowrap}
.nav-link:hover,.nav-link.active{background:rgba(255,255,255,0.18);color:white;border-color:rgba(255,255,255,0.4)}
.hbtns{display:flex;align-items:center;gap:6px}
.hbtn{font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,0.18);color:white}
.hbtn.alert-active{background:rgba(239,68,68,0.25);border-color:rgba(239,68,68,0.5);color:#fca5a5}
.scan-btn{background:linear-gradient(135deg,#1d4ed8,#4f46e5);border-color:transparent;color:white;font-size:12px;padding:5px 14px}
.scan-btn:hover{opacity:0.9}
.scan-btn.spinning{animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cd{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:3px 8px;border-radius:6px;min-width:40px;text-align:center}
.cd.urgent{color:#f59e0b;border-color:#f59e0b;background:rgba(245,158,11,0.12)}
.lu{font-size:11px;color:rgba(255,255,255,0.35);font-family:'JetBrains Mono',monospace}
.scan-prog{display:none;align-items:center;gap:8px;font-size:11px;color:rgba(255,255,255,0.6)}
.prog-bar{width:80px;height:5px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#60a5fa,#a78bfa);border-radius:3px;transition:width 0.3s}
.abadge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:white;font-size:9px;font-weight:800;width:15px;height:15px;border-radius:50%;display:none;align-items:center;justify-content:center}
.abadge.show{display:flex}

/* ── ALERT TICKER ── */
.ticker-bar{background:#070d1c;border-bottom:1px solid #1a2540;padding:4px 16px;display:flex;align-items:center;gap:10px;height:28px;overflow:hidden;position:sticky;top:82px;z-index:99}
.ticker-label{font-size:9px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase;flex-shrink:0}
.ticker-inner{display:flex;gap:20px;white-space:nowrap;animation:tick 30s linear infinite}
.ticker-inner:hover{animation-play-state:paused}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.chip{display:inline-flex;align-items:center;gap:4px;padding:1px 8px;border-radius:8px;font-size:11px;font-weight:600}
.chip.spike{background:rgba(239,68,68,0.2);color:#fca5a5;border:1px solid rgba(239,68,68,0.3)}
.chip.bull{background:rgba(26,122,80,0.2);color:#86efac;border:1px solid rgba(26,122,80,0.3)}
.chip.bear{background:rgba(192,57,43,0.2);color:#fca5a5;border:1px solid rgba(192,57,43,0.3)}
.chip.info{background:rgba(29,85,212,0.15);color:#93c5fd;border:1px solid rgba(29,85,212,0.25)}
.chip.warn{background:rgba(245,158,11,0.15);color:#fde68a;border:1px solid rgba(245,158,11,0.25)}

/* ── MAIN 3-COLUMN LAYOUT ── */
.main3{display:grid;grid-template-columns:280px 1fr 380px;min-height:calc(100vh - 110px);gap:0}
@media(max-width:1100px){.main3{grid-template-columns:240px 1fr}}
@media(max-width:800px){.main3{grid-template-columns:1fr}}

/* ── LEFT: MARKET PULSE ── */
.left-col{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 110px);position:sticky;top:110px}
.pulse-section{border-bottom:1px solid var(--border)}
.pulse-section-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.pulse-section-head:hover{background:var(--bg3)}
.pulse-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:7px}
.pulse-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.pulse-count{font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;margin-left:auto;margin-right:8px}
.pulse-items{padding:0 10px 8px}
.pulse-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:background 0.1s;margin-bottom:2px}
.pulse-item:hover{background:var(--bg3)}
.pi-sym{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:800;color:var(--text);min-width:80px}
.pi-detail{flex:1;font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi-val{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.pulse-empty{font-size:11px;color:var(--text3);text-align:center;padding:14px;font-style:italic}

/* ── CENTRE: TOP 10 TRADES ── */
.centre-col{overflow-y:auto;max-height:calc(100vh - 110px);background:var(--bg)}
.centre-head{padding:14px 16px 10px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.centre-title{font-size:15px;font-weight:800;color:var(--text)}
.centre-sub{font-size:11px;color:var(--text3);margin-top:2px}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.fchip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:14px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.15s}
.fchip:hover{border-color:var(--blue);color:var(--blue)}
.fchip.on{background:var(--blue);border-color:var(--blue);color:white}
.fchip.on.green{background:var(--green);border-color:var(--green)}
.fchip.on.red{background:var(--red);border-color:var(--red)}
.fchip.on.purple{background:var(--purple);border-color:var(--purple)}

/* ── TRADE CARD ── */
.trade-cards{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.trade-card{background:var(--bg2);border-radius:13px;border:1.5px solid var(--border);overflow:hidden;cursor:pointer;transition:all 0.15s}
.trade-card:hover{border-color:var(--blue);box-shadow:0 4px 20px rgba(29,78,216,0.12);transform:translateY(-1px)}
.trade-card.selected{border-color:var(--blue);box-shadow:0 4px 20px rgba(29,78,216,0.15)}
.tc-head{padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.tc-rank{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:800;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tc-sym{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;color:var(--text)}
.tc-sector{font-size:10px;color:var(--text3);margin-top:1px}
.tc-strat-name{font-size:13px;font-weight:700;flex:1;text-align:right}
.tc-score-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.tc-score{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800}
.tc-grade{font-size:9px;font-weight:800;padding:1px 6px;border-radius:5px;text-transform:uppercase;letter-spacing:1px}
.grade-A{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.grade-B{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.grade-C{background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd}
.grade-D{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb}
.tc-body{padding:11px 14px}
.tc-legs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tc-leg{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700}
.tc-leg.buy{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.tc-leg.sell{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.tc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.tc-stat{background:var(--bg3);border-radius:7px;padding:6px 8px;text-align:center}
.tc-stat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:2px}
.tc-stat-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.tc-why{background:var(--bg3);border-radius:8px;padding:8px 10px;font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:8px;border:1px solid var(--border)}
.tc-why strong{color:var(--text)}
.tc-score-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:8px}
.tc-score-fill{height:100%;border-radius:3px;transition:width 0.5s}
.tc-actions{display:flex;gap:6px}
.tc-action-btn{flex:1;padding:6px 10px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all 0.15s;text-align:center;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:4px}
.tc-action-btn.chart{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.tc-action-btn.chart:hover{background:var(--blue);color:white}
.tc-action-btn.detail{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.tc-action-btn.detail:hover{background:var(--border)}

/* ── RIGHT: DETAIL PANEL ── */
.right-col{background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 110px);position:sticky;top:110px}
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;text-align:center;padding:30px;color:var(--text3)}
.detail-empty .icon{font-size:36px}
.spot-block{padding:14px 16px 12px;background:#1e2d4a;color:white;border-bottom:1px solid rgba(255,255,255,0.1)}
.sb-sym{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.5);margin-bottom:2px}
.sb-name{font-size:11px;color:rgba(255,255,255,0.55);margin-bottom:4px}
.sb-price{font-size:28px;font-weight:800;color:white;font-family:'JetBrains Mono',monospace;letter-spacing:-1px}
.sb-meta{margin-top:6px;display:flex;gap:10px;flex-wrap:wrap}
.sb-meta-item{font-size:10px;color:rgba(255,255,255,0.45)}
.sb-meta-item span{color:rgba(255,255,255,0.8);font-weight:600}
.lot-pill{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;background:rgba(245,158,11,0.25);color:#fde68a;border:1px solid rgba(245,158,11,0.3)}
.iv-bar-wrap{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg3)}
.iv-bar-label{font-size:10px;font-weight:700;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.iv-track{height:8px;background:linear-gradient(to right,var(--green) 0%,var(--green) 30%,var(--yellow) 30%,var(--yellow) 65%,var(--red) 65%);border-radius:4px;position:relative;margin-bottom:3px}
.iv-needle{position:absolute;top:-4px;width:16px;height:16px;border-radius:50%;background:white;border:2.5px solid var(--text);transform:translateX(-50%);transition:left 0.5s}
.iv-zones{display:flex;justify-content:space-between;font-size:9px;color:var(--text3)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.met{padding:9px 12px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.met:nth-child(even){border-right:none}
.met:nth-last-child(-n+2){border-bottom:none}
.met-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:3px}
.met-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;line-height:1}
.met-sub{font-size:10px;color:var(--text3);margin-top:2px}
.walls-block{padding:10px 14px;border-bottom:1px solid var(--border)}
.wall-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:7px}
.wcard{border-radius:9px;padding:8px 11px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.wcard.ce{background:var(--red-bg);border:1.5px solid var(--red-bd)}
.wcard.pe{background:var(--green-bg);border:1.5px solid var(--green-bd)}
.wcard-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.wcard.ce .wcard-type{color:var(--red)}.wcard.pe .wcard-type{color:var(--green)}
.wcard-strike{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700}
.wcard.ce .wcard-strike{color:var(--red)}.wcard.pe .wcard-strike{color:var(--green)}
.wcard-oi{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text)}
.wcard-dist{font-size:10px;color:var(--text3);margin-top:2px}
.strat-block{padding:10px 14px}
.strat-card{border-radius:10px;border:1.5px solid var(--blue-bd);overflow:hidden;margin-bottom:8px}
.sc-head{padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.sc-head.pri{background:var(--blue)}.sc-head.alt{background:var(--bg3)}.sc-head.fut{background:linear-gradient(135deg,#0e7490,#0891b2)}
.sc-label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.sc-head.pri .sc-label,.sc-head.fut .sc-label{color:rgba(255,255,255,0.85)}
.sc-head.alt .sc-label{color:var(--text3)}
.sc-type{font-size:11px}
.sc-head.pri .sc-type,.sc-head.fut .sc-type{color:rgba(255,255,255,0.7)}
.sc-head.alt .sc-type{color:var(--text3)}
.sc-body{padding:10px 12px}
.sc-body.pri{background:var(--blue-bg)}.sc-body.alt{background:var(--bg3)}.sc-body.fut{background:var(--teal-bg)}
.sc-name{font-size:14px;font-weight:800;margin-bottom:8px}
.sc-body.pri .sc-name{color:var(--blue)}.sc-body.alt .sc-name{color:var(--text)}.sc-body.fut .sc-name{color:var(--teal)}
.leg{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--blue-bd)}
.leg:last-child{border-bottom:none}
.lbadge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:1px}
.lbadge.buy{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.lbadge.sell{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.ldesc{font-size:12px;font-weight:600;color:var(--text);flex:1}
.lprice{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--yellow)}
.sc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:8px}
.ss{background:white;border-radius:6px;padding:5px 7px;text-align:center;border:1px solid var(--border)}
.ss-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:2px}
.ss-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700}
.sc-expand{margin-top:8px;border-top:1px solid var(--blue-bd);padding-top:7px}
.sc-exp-toggle{font-size:11px;font-weight:700;color:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.sc-exp-toggle .chev{transition:transform 0.2s;font-size:10px;color:var(--text3)}
.sc-exp-body{display:none;font-size:11px;color:var(--text2);line-height:1.65;padding-top:6px}
.sc-exp-body.open{display:block}
.oi-table-wrap{padding:10px 14px;border-top:1px solid var(--border)}
.oi-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:7px}
.oitbl{width:100%;border-collapse:collapse;font-size:11px}
.oitbl th{background:var(--bg3);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:5px 7px;border-bottom:2px solid var(--border);text-align:right}
.oitbl th:first-child{text-align:left}
.oitbl td{font-family:'JetBrains Mono',monospace;padding:5px 7px;border-bottom:1px solid var(--border);text-align:right}
.oitbl td:first-child{text-align:left;font-weight:600}
.oitbl tr.atm td{background:var(--yel-bg);font-weight:700}
.oitbl tr.cew td{background:var(--red-bg)}
.oitbl tr.pew td{background:var(--green-bg)}
.up{color:var(--green)}.dn{color:var(--red)}.neu{color:var(--text3)}
/* Loading */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:12px;color:var(--text3)}
.ring{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--border);border-top-color:var(--blue);animation:spin 0.8s linear infinite}
.scanning{animation:blink 1.5s ease-in-out infinite;color:var(--blue);font-size:12px;font-weight:700}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
/* Alert modal */
.alert-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9998;align-items:flex-start;justify-content:flex-end;padding:55px 14px 0}
.alert-overlay.open{display:flex}
.alert-modal{background:var(--bg2);border:1.5px solid var(--border);border-radius:13px;width:340px;max-height:75vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25)}
.am-head{background:linear-gradient(135deg,#1a0606,#3a1010);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-radius:13px 13px 0 0}
.am-title{font-size:13px;font-weight:800;color:white}
.am-body{padding:14px 16px}
.am-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin:12px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.trow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.trow:last-of-type{border-bottom:none}
.tgl{position:relative;width:36px;height:20px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:0.3s}
.tslider:before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.3s}
.tgl input:checked+.tslider{background:var(--blue)}
.tgl input:checked+.tslider:before{transform:translateX(16px)}
.tinput{width:60px;padding:4px 7px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg3);color:var(--text);font-family:'JetBrains Mono',monospace;text-align:center}
.test-btn{width:100%;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;transition:all 0.15s}
.ah-item{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px}
.ah-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ah-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);flex-shrink:0;width:36px}
/* Toast */
.toast-wrap{position:fixed;top:60px;right:14px;z-index:99999;display:flex;flex-direction:column;gap:6px;max-width:320px;pointer-events:none}
.toast{background:#0f172a;border:2px solid var(--tc,#ef4444);border-radius:10px;padding:11px 13px;pointer-events:all;animation:tIn 0.3s ease-out;position:relative}
.toast::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--tc,#ef4444);border-radius:3px 0 0 3px}
@keyframes tIn{from{transform:translateX(110%)}to{transform:translateX(0)}}
@keyframes tOut{from{opacity:1}to{transform:translateX(110%);opacity:0}}
.toast-type{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--tc,#ef4444);margin-bottom:3px}
.toast-msg{font-size:12px;font-weight:700;color:white;line-height:1.4;margin-bottom:6px}
.toast-actions{display:flex;gap:5px}
.tbtn{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:white;cursor:pointer}
.tdismiss{position:absolute;top:7px;right:8px;font-size:13px;color:rgba(255,255,255,0.4);cursor:pointer;background:none;border:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* ── BUTTERFLY CHAIN ── */
.bfly-wrap{overflow-x:auto;margin-top:0}
.bfly-top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border)}
.bfly-card{background:white;border-radius:9px;padding:9px 12px;border:1px solid var(--border)}
.bfly-card-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:4px}
.bfly-card-val{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
.bfly-card-sub{font-size:10px;color:var(--text3);margin-top:2px;line-height:1.4}
.bfly-tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:900px}
.bfly-tbl thead tr{background:var(--bg3)}
.bfly-tbl th{padding:7px 5px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text3);border-bottom:2px solid var(--border);white-space:nowrap}
.bfly-tbl th.ce-col{color:var(--red);text-align:right}
.bfly-tbl th.pe-col{color:var(--green);text-align:left}
.bfly-tbl th.strike-col{text-align:center;color:var(--text2);min-width:80px}
.bfly-tbl td{padding:5px 5px;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle}
.bfly-tbl td.ce-val{text-align:right;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:11px}
.bfly-tbl td.pe-val{text-align:left;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:11px}
.bfly-tbl td.strike-cell{text-align:center;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:12px;color:var(--text);position:relative}
/* Row highlights */
.bfly-tbl tr.row-atm td{background:rgba(29,85,212,0.06)}
.bfly-tbl tr.row-atm td.strike-cell{color:var(--blue);font-size:13px}
.bfly-tbl tr.row-cewall td{background:rgba(192,57,43,0.05);border-left:3px solid var(--red)}
.bfly-tbl tr.row-pewall td{background:rgba(26,122,80,0.05)}
.bfly-tbl tr.row-pewall td:last-child{border-right:3px solid var(--green)}
.bfly-tbl tr.row-pin td{background:rgba(180,83,9,0.07)}
.bfly-tbl tr.row-squeeze td{background:rgba(234,179,8,0.1);animation:squeezeGlow 2s ease-in-out infinite}
@keyframes squeezeGlow{0%,100%{background:rgba(234,179,8,0.1)}50%{background:rgba(234,179,8,0.2)}}
.bfly-tbl tr:hover td{background:rgba(29,85,212,0.05)!important;cursor:pointer}
/* OI Bar */
.oi-bar-cell{width:80px;position:relative}
.oi-bar-ce{display:flex;align-items:center;justify-content:flex-end;gap:4px}
.oi-bar-pe{display:flex;align-items:center;justify-content:flex-start;gap:4px}
.bar-fill-ce{height:6px;border-radius:3px 0 0 3px;background:var(--red);flex-shrink:0;transition:width 0.3s;min-width:1px}
.bar-fill-pe{height:6px;border-radius:0 3px 3px 0;background:var(--green);flex-shrink:0;transition:width 0.3s;min-width:1px}
.oi-num{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;min-width:36px}
.oi-num.ce{color:var(--red);text-align:right}
.oi-num.pe{color:var(--green)}
/* Buildup signal */
.bdup{font-size:11px;font-weight:800;padding:2px 6px;border-radius:5px;white-space:nowrap;cursor:help}
.bdup.long-build{background:#dcfce7;color:#15803d;border:1px solid #86efac}
.bdup.short-build{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
.bdup.squeeze{background:#fef9c3;color:#854d0e;border:1px solid #fde047;animation:squeezeGlow 1.5s ease-in-out infinite}
.bdup.unwind{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.bdup.neutral{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
/* Delta cell */
.delta-num{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700}
.delta-bar{display:inline-block;height:3px;border-radius:2px;margin-left:3px;vertical-align:middle}
/* IV cell */
.iv-num{font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
/* LTP change */
.ltp-up{color:var(--green);font-weight:700}
.ltp-dn{color:var(--red);font-weight:700}
/* Hover tooltip */
.bfly-tooltip{position:fixed;background:#0f172a;color:white;border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.65;max-width:280px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.4);pointer-events:none;border:1px solid rgba(255,255,255,0.15);display:none}
.bfly-tooltip.show{display:block}
.bfly-tooltip .tt-title{font-size:11px;font-weight:800;color:#60a5fa;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
</style>
</head>

<script>
let currentIndex   = 'NIFTY'
let prevData       = null
let chainData      = null
let allExpiries    = []         // all expiries from NSE for current index
let selectedExpiry = null       // currently selected expiry
let prevOISnapshot = {}         // for spike detection {strike: {ce, pe}}
let alertHistory   = []         // rolling alerts for ticker
let oiSpikeAlerts  = []         // prominent OI spike cards shown in panel
// Strategy persistence tracker — stores last 5 strategy names
// When same strategy appears 3+ times in a row = CONFIRMED signal
let strategyHistory = []   // ['BEAR CALL SPREAD', 'BEAR CALL SPREAD', 'IRON CONDOR', ...]
let indexHistory    = []   // full snapshots: [{name,dir,score,ceOI,peOI,pcr,iv,spot,ceW,peW,ts}]
const INDEX_SYMBOLS={'NIFTY':'NIFTY','BANKNIFTY':'BANKNIFTY','FINNIFTY':'FINNIFTY','MIDCPNIFTY':'MIDCPNIFTY','NIFTY NEXT 50':'NIFTY NEXT 50','SENSEX':'SENSEX'}
// Data source indicator
let dataSource = 'demo'

async function fetchChain(symbol){
  const nseSymbol=INDEX_SYMBOLS[symbol]||symbol
  const encoded=encodeURIComponent(nseSymbol)
  const nseUrl=`https://www.nseindia.com/api/option-chain-indices?symbol=${encoded}`

  // Strategy 1: Local proxy on trading PC (most reliable — never blocked by NSE)
  // Run nse-proxy.js on your PC to enable this
  try {
    const res = await fetch(`http://localhost:3001/chain?symbol=${encoded}`,{signal:AbortSignal.timeout(4000)})
    if(res.ok){const json=await res.json();if(json&&json.records){dataSource='local';return json}}
  } catch(e){}

  // Strategy 2: Vercel server proxy (chain.js)
  try {
    const res = await fetch(`/api/chain?symbol=${encoded}`,{signal:AbortSignal.timeout(12000)})
    if(res.ok){const json=await res.json();if(json&&json.records){dataSource='vercel';return json}}
  } catch(e){}

  // Strategy 3: Public CORS proxies (fallback)
  const proxies=[
    `https://api.allorigins.win/raw?url=${encodeURIComponent(nseUrl)}`,
    `https://corsproxy.io/?${encodeURIComponent(nseUrl)}`,
  ]
  for(const url of proxies){
    try{
      const res=await fetch(url,{signal:AbortSignal.timeout(10000)})
      if(!res.ok)continue
      const json=await res.json()
      if(json&&json.records){dataSource='proxy';return json}
    }catch(e){continue}
  }

  dataSource='demo'
  return null
}
function parseChain(raw){
  const records   = raw.records
  const data      = records.data||[]
  const spot      = records.underlyingValue||0
  const allExpDates = records.expiryDates||[]
  // Use selectedExpiry if set and valid, otherwise nearest
  const expiry    = (selectedExpiry && allExpDates.includes(selectedExpiry))
                    ? selectedExpiry : (allExpDates[0]||'')
  // Update global expiry list
  allExpiries = allExpDates
  const strikes={}
  for(const row of data){if(row.expiryDate!==expiry)continue;const k=row.strikePrice;if(!strikes[k])strikes[k]={strike:k,ce:{},pe:{}};if(row.CE)strikes[k].ce=row.CE;if(row.PE)strikes[k].pe=row.PE}
  const strikeList=Object.values(strikes).sort((a,b)=>a.strike-b.strike)
  let atm=strikeList.reduce((best,s)=>Math.abs(s.strike-spot)<Math.abs(best.strike-spot)?s:best,strikeList[0])
  let maxPainStrike=0,minPainVal=Infinity
  for(const s of strikeList){let loss=0;for(const other of strikeList){if(other.strike<s.strike)loss+=(other.ce.openInterest||0)*(s.strike-other.strike);if(other.strike>s.strike)loss+=(other.pe.openInterest||0)*(other.strike-s.strike)}if(loss<minPainVal){minPainVal=loss;maxPainStrike=s.strike}}
  const ceWall=strikeList.reduce((b,s)=>(s.ce.openInterest||0)>(b.ce.openInterest||0)?s:b,strikeList[0])
  const peWall=strikeList.reduce((b,s)=>(s.pe.openInterest||0)>(b.pe.openInterest||0)?s:b,strikeList[0])
  const totalCeOI=strikeList.reduce((s,r)=>s+(r.ce.openInterest||0),0)
  const totalPeOI=strikeList.reduce((s,r)=>s+(r.pe.openInterest||0),0)
  const pcr=totalCeOI>0?totalPeOI/totalCeOI:1
  const atmIV=((atm.ce.impliedVolatility||0)+(atm.pe.impliedVolatility||0))/2
  const atmIdx=strikeList.indexOf(atm)
  return{spot,expiry,allExpiries,atm:atm.strike,maxPainStrike,ceWall,peWall,pcr,totalCeOI,totalPeOI,atmIV,
    skewStrikes:strikeList.slice(Math.max(0,atmIdx-3),atmIdx+4),
    nearStrikes:strikeList.slice(Math.max(0,atmIdx-7),atmIdx+8),
    strikeList,atmRow:atm,timestamp:new Date()}
}
function computeStrategy(d){
  // ── IV ANALYSIS (Natenberg core) ──
  const atmIV    = d.atmIV || 15
  const ivNormal = currentIndex==='BANKNIFTY'?20:14
  const ivHigh   = ivNormal * 1.5
  const ivLow    = ivNormal * 0.7
  const ivState  = atmIV > ivHigh ? 'HIGH' : atmIV < ivLow ? 'LOW' : 'NORMAL'
  const ivAction = ivState==='HIGH'
    ? `IV ${atmIV.toFixed(1)}% is ELEVATED — premium expensive. Favour selling (Iron Condor, Straddle Sell).`
    : ivState==='LOW'
    ? `IV ${atmIV.toFixed(1)}% is LOW — premium cheap. Favour buying (Buy CE/PE, Debit Spread).`
    : `IV ${atmIV.toFixed(1)}% is normal — both buying and selling valid. Follow OI direction.`
  const ivPct    = Math.min(100, Math.round((atmIV / ivHigh) * 100))
  const{spot,ceWall,peWall,maxPainStrike,pcr}=d
  const ceWallStr=ceWall.strike,peWallStr=peWall.strike
  const distToCe=ceWallStr-spot,distToPe=spot-peWallStr
  const inRange=spot>peWallStr&&spot<ceWallStr,abovePain=spot>maxPainStrike
  const step      = ceWallStr>20000?100:50
  const dte       = getDTE(d.expiry)
  const dteLabel  = dte===0?'EXPIRY DAY':dte===1?'TOMORROW':dte<=3?'NEAR EXPIRY':dte<=7?'THIS WEEK':'FAR EXPIRY'
  let bullSignals=0,bearSignals=0,reasons=[]
  if(pcr>1.3){bearSignals+=2;reasons.push({dir:'bear',text:`PCR ${pcr.toFixed(2)} — strongly bearish (heavy put buying)`})}
  else if(pcr>1.1){bearSignals+=1;reasons.push({dir:'bear',text:`PCR ${pcr.toFixed(2)} — mildly bearish`})}
  else if(pcr<0.7){bullSignals+=2;reasons.push({dir:'bull',text:`PCR ${pcr.toFixed(2)} — strongly bullish (heavy call buying)`})}
  else if(pcr<0.9){bullSignals+=1;reasons.push({dir:'bull',text:`PCR ${pcr.toFixed(2)} — mildly bullish`})}
  else{reasons.push({dir:'neut',text:`PCR ${pcr.toFixed(2)} — neutral, no strong directional bias`})}
  if(distToCe<150){bearSignals+=2;reasons.push({dir:'bear',text:`Only ${Math.round(distToCe)}pts to CE wall — strong resistance nearby`})}
  else if(distToCe<300){bearSignals+=1;reasons.push({dir:'warn',text:`${Math.round(distToCe)}pts to CE wall — watch resistance`})}
  if(distToPe<150){bullSignals+=2;reasons.push({dir:'bull',text:`Only ${Math.round(distToPe)}pts to PE wall — strong support nearby`})}
  if(!abovePain&&Math.abs(spot-maxPainStrike)<200){bullSignals+=1;reasons.push({dir:'bull',text:`Spot below max pain (${maxPainStrike}) — gravity pulls up`})}
  else if(abovePain&&Math.abs(spot-maxPainStrike)<200){bearSignals+=1;reasons.push({dir:'bear',text:`Spot above max pain (${maxPainStrike}) — gravity pulls down`})}
  let dir='range',zone='IN RANGE',bias='NEUTRAL'
  if(!inRange&&spot>=ceWallStr){dir='bull';zone='ABOVE CE WALL';bias='STRONG BULL'}
  else if(!inRange&&spot<=peWallStr){dir='bear';zone='BELOW PE WALL';bias='STRONG BEAR'}
  else if(bullSignals>bearSignals+1){dir='bull';bias='BULLISH'}
  else if(bearSignals>bullSignals+1){dir='bear';bias='BEARISH'}
  else if(bearSignals===bullSignals&&bearSignals>0){dir='range';bias='RANGE BOUND'}
  // ── STRATEGY ENGINE — 5 strategies ──────────────────────
  // 1. LONG CE        — price broke above CE wall (momentum/breakout)
  // 2. LONG PE        — price broke below PE wall (momentum/breakdown)
  // 3. BEAR CALL SPREAD — near CE wall or bearish bias
  // 4. BULL PUT SPREAD  — near PE wall or bullish bias
  // 5. IRON CONDOR      — range bound, neutral PCR

  const atmCePrice = d.atmRow.ce?.lastPrice || 0
  const atmPePrice = d.atmRow.pe?.lastPrice || 0

  // All strategies as an array — show primary + secondary
  let allStrategies = []

  // BREAKOUT — price above CE wall
  if (!inRange && spot >= ceWallStr) {
    allStrategies.push({
      name:'LONG CE (BREAKOUT)',
      type:'Momentum / Bullish',
      tag:'🚀 AGGRESSIVE',
      tagColor:'var(--green)',
      rationale:`CE wall at ${ceWallStr} has been broken. ${(ceWall.ce?.openInterest/100000||0).toFixed(1)}L contracts were defending it — now that wall is gone, price can run freely. Momentum trade.`,
      legs:[{action:'BUY',desc:`${d.atm} CE (ATM)`,price:atmCePrice.toFixed(1)}],
      risk: Math.round(atmCePrice * 25),
      reward: Math.round(atmCePrice * 25 * 2),
      rr:'1:2.0 (target 2x premium)',
      exit:`Exit at 2x premium OR if price falls back below ${ceWallStr}`,
      when:'Enter on breakout candle close above ' + ceWallStr,
      avoid:'Do NOT enter if OI at ' + ceWallStr + ' is still very high — wall may not be truly broken'
    })
    allStrategies.push({
      name:'BULL PUT SPREAD',
      type:'Range / Bullish',
      tag:'🛡️ SAFER',
      tagColor:'var(--blue)',
      rationale:`Breakout confirmed. Sell puts at old resistance-turned-support at ${ceWallStr}. Lower risk than buying CE outright.`,
      legs:[{action:'SELL',desc:`${ceWallStr} PE`,price:(d.strikeList.find(s=>s.strike===ceWallStr)?.pe?.lastPrice||0).toFixed(1)},{action:'BUY',desc:`${ceWallStr-step} PE`,price:'hedge'}],
      risk: step * 25,
      reward: Math.round(((d.strikeList.find(s=>s.strike===ceWallStr)?.pe?.lastPrice||0)) * 25),
      rr:'Limited risk',
      exit:`Exit if spot falls back below ${ceWallStr}`,
      when:'Enter after breakout is confirmed — not before',
      avoid:'Avoid if breakout happened on very low volume'
    })
  }
  // BREAKDOWN — price below PE wall
  else if (!inRange && spot <= peWallStr) {
    allStrategies.push({
      name:'LONG PE (BREAKDOWN)',
      type:'Momentum / Bearish',
      tag:'🔻 AGGRESSIVE',
      tagColor:'var(--red)',
      rationale:`PE wall at ${peWallStr} has been broken. ${(peWall.pe?.openInterest/100000||0).toFixed(1)}L contracts were supporting it — now that floor is gone, price can fall freely.`,
      legs:[{action:'BUY',desc:`${d.atm} PE (ATM)`,price:atmPePrice.toFixed(1)}],
      risk: Math.round(atmPePrice * 25),
      reward: Math.round(atmPePrice * 25 * 2),
      rr:'1:2.0 (target 2x premium)',
      exit:`Exit at 2x premium OR if price recovers above ${peWallStr}`,
      when:'Enter on breakdown candle close below ' + peWallStr,
      avoid:'Do NOT enter if PE wall OI is still building — wall may hold'
    })
    allStrategies.push({
      name:'BEAR CALL SPREAD',
      type:'Range / Bearish',
      tag:'🛡️ SAFER',
      tagColor:'var(--blue)',
      rationale:`Breakdown confirmed. Sell calls at old support-turned-resistance at ${peWallStr}. Lower risk than buying PE outright.`,
      legs:[{action:'SELL',desc:`${peWallStr} CE`,price:(d.strikeList.find(s=>s.strike===peWallStr)?.ce?.lastPrice||0).toFixed(1)},{action:'BUY',desc:`${peWallStr+step} CE`,price:'hedge'}],
      risk: step * 25,
      reward: Math.round(((d.strikeList.find(s=>s.strike===peWallStr)?.ce?.lastPrice||0)) * 25),
      rr:'Limited risk',
      exit:`Exit if spot recovers above ${peWallStr}`,
      when:'Enter after breakdown confirmed — not during the fall',
      avoid:'Avoid if breakdown happened near end of day — gap risk overnight'
    })
  }
  // NEAR CE WALL — bearish bias
  else if (distToCe < 200) {
    const ss=ceWallStr,bs=ceWallStr-step
    const sp=ceWall.ce?.lastPrice||0,bp=d.strikeList.find(s=>s.strike===bs)?.ce?.lastPrice||0
    allStrategies.push({
      name:'BEAR CALL SPREAD',
      type:'Near Resistance',
      tag:'⚡ PRIMARY',
      tagColor:'var(--red)',
      rationale:`Only ${Math.round(distToCe)}pts from CE wall at ${ss} which has ${(ceWall.ce?.openInterest/100000||0).toFixed(1)}L OI. Sell the wall, collect premium — institutions will defend it.`,
      legs:[{action:'SELL',desc:`${ss} CE`,price:sp.toFixed(1)},{action:'BUY',desc:`${bs} CE`,price:bp.toFixed(1)}],
      risk:Math.abs((ss-bs)*25-Math.round((sp-bp)*25)),reward:Math.abs(Math.round((sp-bp)*25)),
      rr: Math.abs(Math.round((sp-bp)*25)) > 0 ? '1:'+(Math.abs(Math.round((sp-bp)*25))/Math.abs((ss-bs)*25-Math.round((sp-bp)*25))).toFixed(2) : '—',
      exit:`Exit if ${ss} CE OI drops >20% OR spot closes above ${ss+step}`,
      when:'Enter when spot is within 100pts of ' + ss,
      avoid:'Avoid if PCR is below 0.8 — too bullish, wall may break'
    })
    allStrategies.push({
      name:'IRON CONDOR',
      type:'Range Bound',
      tag:'🛡️ ALTERNATIVE',
      tagColor:'var(--blue)',
      rationale:`Sell both walls — CE at ${ceWallStr} and PE at ${peWallStr}. Collect premium from both sides while market stays in range.`,
      legs:[{action:'SELL',desc:`${ceWallStr} CE`,price:sp.toFixed(1)},{action:'BUY',desc:`${ceWallStr+step} CE`,price:'hedge'},{action:'SELL',desc:`${peWallStr} PE`,price:(peWall.pe?.lastPrice||0).toFixed(1)},{action:'BUY',desc:`${peWallStr-step} PE`,price:'hedge'}],
      risk: step*25, reward: Math.round((sp+(peWall.pe?.lastPrice||0))*25),
      rr:'Defined risk both sides',
      exit:`Exit if spot breaks above ${ceWallStr} or below ${peWallStr}`,
      when:'Best entered Monday/Tuesday morning when both walls intact',
      avoid:'Never hold Iron Condor into news events or RBI policy'
    })
  }
  // NEAR PE WALL — bullish bias
  else if (distToPe < 200) {
    const ss=peWallStr,bs=peWallStr+step
    const sp=peWall.pe?.lastPrice||0,bp=d.strikeList.find(s=>s.strike===bs)?.pe?.lastPrice||0
    allStrategies.push({
      name:'BULL PUT SPREAD',
      type:'Near Support',
      tag:'⚡ PRIMARY',
      tagColor:'var(--green)',
      rationale:`Only ${Math.round(distToPe)}pts from PE wall at ${ss} which has ${(peWall.pe?.openInterest/100000||0).toFixed(1)}L OI. Sell the floor, collect premium — institutions will defend it.`,
      legs:[{action:'SELL',desc:`${ss} PE`,price:sp.toFixed(1)},{action:'BUY',desc:`${bs} PE`,price:bp.toFixed(1)}],
      risk:Math.abs((bs-ss)*25-Math.round((sp-bp)*25)),reward:Math.abs(Math.round((sp-bp)*25)),
      rr: Math.abs(Math.round((sp-bp)*25)) > 0 ? '1:'+(Math.abs(Math.round((sp-bp)*25))/Math.abs((bs-ss)*25-Math.round((sp-bp)*25))).toFixed(2) : '—',
      exit:`Exit if ${ss} PE OI drops >20% OR spot closes below ${ss-step}`,
      when:'Enter when spot bounces near ' + ss + ' with volume confirmation',
      avoid:'Avoid on expiry day — gap risk is high near support'
    })
    allStrategies.push({
      name:'IRON CONDOR',
      type:'Range Bound',
      tag:'🛡️ ALTERNATIVE',
      tagColor:'var(--blue)',
      rationale:`Sell both walls — PE at ${peWallStr} and CE at ${ceWallStr}. Collect premium from both sides while market stays in range.`,
      legs:[{action:'SELL',desc:`${peWallStr} PE`,price:sp.toFixed(1)},{action:'BUY',desc:`${peWallStr-step} PE`,price:'hedge'},{action:'SELL',desc:`${ceWallStr} CE`,price:(ceWall.ce?.lastPrice||0).toFixed(1)},{action:'BUY',desc:`${ceWallStr+step} CE`,price:'hedge'}],
      risk: step*25, reward: Math.round((sp+(ceWall.ce?.lastPrice||0))*25),
      rr:'Defined risk both sides',
      exit:`Exit if spot breaks above ${ceWallStr} or below ${peWallStr}`,
      when:'Best entered Monday/Tuesday morning when both walls intact',
      avoid:'Never hold Iron Condor into news events or RBI policy'
    })
  }
  // IN RANGE — neutral
  else {
    const sc=ceWallStr,bc=ceWallStr+step,sp2=peWallStr,bp2=peWallStr-step
    const scP=ceWall.ce?.lastPrice||0,spP=peWall.pe?.lastPrice||0,mg=Math.round((scP+spP)*25)
    if (bearSignals > bullSignals) {
      const bs2=ceWallStr-step,bp3=ceWall.ce?.lastPrice||0,bb3=d.strikeList.find(s=>s.strike===bs2)?.ce?.lastPrice||0
      allStrategies.push({
        name:'BEAR CALL SPREAD',
        type:'Range / Bearish Bias',
        tag:'⚡ PRIMARY',
        tagColor:'var(--red)',
        rationale:`PCR and signals lean bearish. Sell CE wall at ${sc} — ${(ceWall.ce?.openInterest/100000||0).toFixed(1)}L OI defending this level.`,
        legs:[{action:'SELL',desc:`${sc} CE`,price:bp3.toFixed(1)},{action:'BUY',desc:`${bs2} CE`,price:bb3.toFixed(1)}],
        risk:Math.abs((sc-bs2)*25-Math.round((bp3-bb3)*25)),reward:Math.abs(Math.round((bp3-bb3)*25)),
        rr:'Defined risk',
        exit:`Exit if ${sc} CE OI drops >20% OR spot closes above ${sc+step}`,
        when:'Enter when PCR is rising (more put buying) + spot near top of range',
        avoid:'Avoid if market has strong bullish news catalyst'
      })
    } else if (bullSignals > bearSignals) {
      const bs3=peWallStr+step,bp4=peWall.pe?.lastPrice||0,bb4=d.strikeList.find(s=>s.strike===bs3)?.pe?.lastPrice||0
      allStrategies.push({
        name:'BULL PUT SPREAD',
        type:'Range / Bullish Bias',
        tag:'⚡ PRIMARY',
        tagColor:'var(--green)',
        rationale:`PCR and signals lean bullish. Sell PE wall at ${sp2} — ${(peWall.pe?.openInterest/100000||0).toFixed(1)}L OI defending this level.`,
        legs:[{action:'SELL',desc:`${sp2} PE`,price:bp4.toFixed(1)},{action:'BUY',desc:`${bs3} PE`,price:bb4.toFixed(1)}],
        risk:Math.abs((bs3-sp2)*25-Math.round((bp4-bb4)*25)),reward:Math.abs(Math.round((bp4-bb4)*25)),
        rr:'Defined risk',
        exit:`Exit if ${sp2} PE OI drops >20% OR spot closes below ${sp2-step}`,
        when:'Enter when PCR is falling (more call buying) + spot near bottom of range',
        avoid:'Avoid if market has bearish global cues overnight'
      })
    }
    allStrategies.push({
      name:'IRON CONDOR',
      type:'Range Bound',
      tag: bullSignals===bearSignals ? '⚡ PRIMARY' : '🛡️ ALTERNATIVE',
      tagColor:'var(--purple)',
      rationale:`Market in range between ${sp2} and ${sc}. Sell both walls and collect premium from both sides. ${mg > 0 ? 'Premium collected: ₹'+mg.toLocaleString('en-IN') : ''}`,
      legs:[{action:'SELL',desc:`${sc} CE`,price:scP.toFixed(1)},{action:'BUY',desc:`${bc} CE`,price:'hedge'},{action:'SELL',desc:`${sp2} PE`,price:spP.toFixed(1)},{action:'BUY',desc:`${bp2} PE`,price:'hedge'}],
      risk:step*25-Math.abs(mg),reward:Math.abs(mg),
      rr: Math.abs(mg) > 0 ? '1:'+(Math.abs(mg)/(step*25-Math.abs(mg))).toFixed(2) : '—',
      exit:`Exit if spot breaks above ${sc} or below ${sp2}`,
      when:'Best entered early week (Mon/Tue). Time decay works for you every day.',
      avoid:'Never hold into RBI policy, budget day, or major global events'
    })
  }

  // ── EXPIRY DAY OVERRIDE ──
  if (dte === 0) {
    allStrategies = []
    const atmCeP = d.atmRow.ce?.lastPrice||0
    const atmPeP = d.atmRow.pe?.lastPrice||0
    allStrategies.push({
      name:'STRADDLE SELL (EXPIRY DAY)',type:'Expiry Day — Sell Premium',tag:'🔴 EXPIRY ONLY',tagColor:'var(--red)',
      rationale:`Expiry day — both ATM CE and PE will decay to near-zero by 3:30pm. Sell both and collect full premium. Works best when market stays near max pain (${d.maxPainStrike}).`,
      legs:[{action:'SELL',desc:`${d.atm} CE (ATM)`,price:atmCeP.toFixed(1)},{action:'SELL',desc:`${d.atm} PE (ATM)`,price:atmPeP.toFixed(1)}],
      risk:step*25,reward:Math.round((atmCeP+atmPeP)*25),rr:'High reward, capped loss with SL',
      exit:`Exit BOTH if spot moves more than ${step*2}pts from ${d.atm}. Hard exit by 3:00pm.`,
      when:'Only on expiry Thursday. Only if spot is within 100pts of max pain.',
      avoid:'Never without a stop loss. Never if large news after 12pm. Exit by 3:00pm hard.'
    })
    allStrategies.push({
      name:'STRANGLE SELL (EXPIRY SAFER)',type:'Expiry Day — Wider Range',tag:'🟡 EXPIRY SAFER',tagColor:'var(--yellow)',
      rationale:`Sell OTM CE wall (${ceWallStr}) + OTM PE wall (${peWallStr}). Wider range = safer. Both expire worthless if market stays between the two walls.`,
      legs:[{action:'SELL',desc:`${ceWallStr} CE`,price:(ceWall.ce?.lastPrice||0).toFixed(1)},{action:'SELL',desc:`${peWallStr} PE`,price:(peWall.pe?.lastPrice||0).toFixed(1)}],
      risk:step*25,reward:Math.round(((ceWall.ce?.lastPrice||0)+(peWall.pe?.lastPrice||0))*25),rr:'Lower premium but safer range',
      exit:`Exit if spot breaks above ${ceWallStr} or below ${peWallStr}. Exit by 3:00pm.`,
      when:'Expiry day when both CE wall and PE wall OI is still intact.',
      avoid:'Exit by 3:00pm regardless. Never hold into final auction.'
    })
  }

  // ── SYNTHETIC / FUTURES STRATEGIES — high conviction only ──
  if (dte >= 2) {
    const confidence_pre = bullSignals + bearSignals >= 3 ? (Math.abs(bullSignals-bearSignals)>=2?4:3) : 2
    if (confidence_pre >= 4) {
      const atmCeP2 = d.atmRow.ce?.lastPrice||0
      const atmPeP2 = d.atmRow.pe?.lastPrice||0
      if (dir==='bull' || (!isInRange(spot,peWallStr,ceWallStr) && spot>=ceWallStr)) {
        allStrategies.push({
          name:'SYNTHETIC LONG',type:'Futures Alternative',tag:'🔷 FUTURES ALT',tagColor:'#0891b2',
          rationale:`Buy ATM CE + Sell ATM PE = same payoff as buying Nifty futures but capital efficient. Profits unlimited on upside. Use when strongly bullish with high confidence.`,
          legs:[{action:'BUY',desc:`${d.atm} CE (ATM)`,price:atmCeP2.toFixed(1)},{action:'SELL',desc:`${d.atm} PE (ATM)`,price:atmPeP2.toFixed(1)}],
          risk:Math.round(Math.abs(atmCeP2-atmPeP2)*25),reward:Math.round(atmCeP2*25*3),rr:'Unlimited upside',
          exit:`Exit if spot falls below ${peWallStr} OR CE reaches 2x premium`,
          when:'Confidence 4-5/5 + confirmed bullish + DTE ≥ 2 days',
          avoid:'Never on expiry day. Always define your stop loss level before entering.'
        })
      }
      if (dir==='bear' || (!isInRange(spot,peWallStr,ceWallStr) && spot<=peWallStr)) {
        allStrategies.push({
          name:'SYNTHETIC SHORT',type:'Futures Alternative',tag:'🔷 FUTURES ALT',tagColor:'#0891b2',
          rationale:`Buy ATM PE + Sell ATM CE = same payoff as shorting Nifty futures. Profits unlimited on downside. Use when strongly bearish with high confidence.`,
          legs:[{action:'BUY',desc:`${d.atm} PE (ATM)`,price:atmPeP2.toFixed(1)},{action:'SELL',desc:`${d.atm} CE (ATM)`,price:atmCeP2.toFixed(1)}],
          risk:Math.round(Math.abs(atmPeP2-atmCeP2)*25),reward:Math.round(atmPeP2*25*3),rr:'Unlimited downside',
          exit:`Exit if spot rises above ${ceWallStr} OR PE reaches 2x premium`,
          when:'Confidence 4-5/5 + confirmed bearish + DTE ≥ 2 days',
          avoid:'Never on expiry day. Always define your stop loss before entering.'
        })
      }
    }
  }

  // Primary = first strategy, secondary = second
  const strategy = allStrategies[0]
  const strategy2 = allStrategies[1] || null
  if (strategy) { strategy.dteLabel = dteLabel; strategy.dte = dte }

  // ── FUTURES STRATEGY — always shown as 3rd card ──
  const atmCeF = d.atmRow.ce?.lastPrice||0, atmPeF = d.atmRow.pe?.lastPrice||0
  const futLot = currentIndex==='BANKNIFTY'?15:currentIndex==='SENSEX'?10:25
  let futStrat = {}
  if (dir==='bull'||(!inRange&&spot>=ceWallStr)) {
    futStrat = {
      name:'SYNTHETIC LONG (Futures Equiv.)',type:'Futures / High Conviction',tag:'🔷 FUTURES',tagColor:'#0891b2',
      rationale:`Buy ATM CE + Sell ATM PE = acts exactly like buying ${currentIndex} futures but at lower capital. Each 1pt up = ₹${futLot} profit. SL below PE wall at ${peWallStr}.`,
      legs:[{action:'BUY',desc:`${d.atm} CE (ATM)`,price:atmCeF.toFixed(1)},{action:'SELL',desc:`${d.atm} PE (ATM)`,price:atmPeF.toFixed(1)}],
      risk:Math.round(Math.abs(atmCeF-atmPeF)*futLot),reward:Math.round(step*futLot*2),rr:'Unlimited upside',
      exit:`Exit if ${currentIndex} falls below ${peWallStr} OR CE reaches 2x premium`,
      when:`Confirmed bullish + DTE ≥ 2 days + CE wall broken or PCR < 0.9`,
      avoid:`Never on expiry day. Never without a defined SL. Results day = huge gap risk.`
    }
  } else {
    futStrat = {
      name:'SYNTHETIC SHORT (Futures Equiv.)',type:'Futures / High Conviction',tag:'🔷 FUTURES',tagColor:'#0891b2',
      rationale:`Buy ATM PE + Sell ATM CE = acts exactly like shorting ${currentIndex} futures. Each 1pt down = ₹${futLot} profit. Cover at PE wall target ${peWallStr}.`,
      legs:[{action:'BUY',desc:`${d.atm} PE (ATM)`,price:atmPeF.toFixed(1)},{action:'SELL',desc:`${d.atm} CE (ATM)`,price:atmCeF.toFixed(1)}],
      risk:Math.round(Math.abs(atmPeF-atmCeF)*futLot),reward:Math.round(step*futLot*2),rr:'Unlimited downside',
      exit:`Exit if ${currentIndex} rises above ${ceWallStr} OR PE reaches 2x premium`,
      when:`Confirmed bearish + DTE ≥ 2 days + PE wall broken or PCR > 1.2`,
      avoid:`Never on expiry day. Never without SL. This is equivalent to a naked futures short.`
    }
  }
  // Confidence score 1-5 based on signal alignment
  const totalSig = bullSignals + bearSignals
  const dominance = Math.abs(bullSignals - bearSignals)
  let confidence = 1
  if (totalSig >= 4 && dominance >= 3) confidence = 5
  else if (totalSig >= 3 && dominance >= 2) confidence = 4
  else if (totalSig >= 2 && dominance >= 1) confidence = 3
  else if (totalSig >= 1) confidence = 2
  else confidence = 1

  return{dir,zone,bias,strategy,strategy2,futStrat,allStrategies,reasons,bullSignals,bearSignals,confidence,dte,dteLabel,atmIV,ivState,ivAction,ivPct}
}

function renderConfidence(score) {
  const labels = ['','Very Weak','Weak','Moderate','Strong','Very Strong']
  const classes = ['','conf-weak','conf-weak','conf-mod','conf-strong','conf-max']
  const dots = [1,2,3,4,5].map(i =>
    `<div class="conf-dot ${i<=score ? 'filled-'+score : ''}"></div>`
  ).join('')
  return `<div class="confidence-wrap">
    <span class="confidence-label">Signal Strength</span>
    <div class="confidence-dots">${dots}</div>
    <span class="confidence-text ${classes[score]}">${labels[score]}</span>
  </div>`
}

// Unique ID counter for strategy card toggles
let _cardId = 0

function renderPayoffDiagram(strat, d) {
  if (!strat || !d) return ''
  const step = Math.round((d.ceWall.strike - d.peWall.strike) / 8) || 50
  const center = d.atm
  const strikes = []
  for (let i = -4; i <= 4; i++) strikes.push(center + i * step)

  // Calculate approximate P&L at each strike
  const lot = 25 // approximate for index
  const pnl = strikes.map(s => {
    let pl = 0
    if (strat.name?.includes('BEAR CALL SPREAD') || strat.name?.includes('BEAR CALL')) {
      const sellStrike = d.ceWall.strike, buyStrike = d.ceWall.strike + step
      const credit = (strat.reward || 0) / lot
      if (s <= sellStrike) pl = credit
      else if (s >= buyStrike) pl = credit - step
      else pl = credit - (s - sellStrike)
    } else if (strat.name?.includes('BULL PUT SPREAD') || strat.name?.includes('BULL PUT')) {
      const sellStrike = d.peWall.strike, buyStrike = d.peWall.strike - step
      const credit = (strat.reward || 0) / lot
      if (s >= sellStrike) pl = credit
      else if (s <= buyStrike) pl = credit - step
      else pl = credit - (sellStrike - s)
    } else if (strat.name?.includes('IRON CONDOR')) {
      const cSell = d.ceWall.strike, pSell = d.peWall.strike
      const credit = (strat.reward || 0) / lot
      if (s >= pSell && s <= cSell) pl = credit
      else if (s > cSell) pl = credit - Math.min(step, s - cSell)
      else pl = credit - Math.min(step, pSell - s)
    } else if (strat.name?.includes('BUY ATM CE')) {
      pl = Math.max(-(strat.risk/lot), s - center - (strat.risk/lot))
    } else if (strat.name?.includes('BUY ATM PE')) {
      pl = Math.max(-(strat.risk/lot), center - s - (strat.risk/lot))
    } else {
      return 0
    }
    return Math.round(pl * lot)
  })

  const maxPL = Math.max(...pnl, 1)
  const minPL = Math.min(...pnl, -1)
  const range = maxPL - minPL || 1
  const chartH = 50

  const bars = strikes.map((s, i) => {
    const v = pnl[i]
    const isProfit = v >= 0
    const h = Math.round(Math.abs(v) / range * chartH * 0.8)
    const yProfit = chartH/2 - (v > 0 ? h : 0)
    const isATM = s === center
    return `<g title="₹${s}: ${v>=0?'+':''}₹${v.toLocaleString('en-IN')}">
      <rect x="${i*16+2}" y="${yProfit}" width="13" height="${Math.max(1,h)}"
        fill="${v>0?'#16a34a':'#dc2626'}" opacity="${isATM?1:0.75}" rx="1"/>
      <text x="${i*16+8.5}" y="${chartH+12}" text-anchor="middle"
        font-size="7" fill="#8899b0">${s===center?'ATM':''}</text>
    </g>`
  }).join('')

  const beText = pnl.some(p=>p>0)&&pnl.some(p=>p<0)?
    `Break-even: ~₹${strikes[pnl.findIndex(p=>p>=0)]} & ₹${strikes[pnl.findLastIndex?pnl.findLastIndex(p=>p>=0):pnl.length-1]}`:''

  return `<div style="margin:10px 0;padding:10px 12px;background:var(--bg3);border-radius:9px;border:1px solid var(--border)">
    <div style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">
      📊 Payoff at Expiry — ${strat.name}
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="flex:1;position:relative">
        <svg width="100%" viewBox="0 0 ${strikes.length*16+4} ${chartH+20}" style="overflow:visible">
          <line x1="0" y1="${chartH/2}" x2="${strikes.length*16+4}" y2="${chartH/2}"
            stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>
          ${bars}
        </svg>
      </div>
      <div style="flex-shrink:0;font-size:11px;color:var(--text2)">
        <div style="color:var(--green);font-weight:700">Max Profit: ₹${Math.max(...pnl).toLocaleString('en-IN')}</div>
        <div style="color:var(--red);font-weight:700;margin-top:3px">Max Loss: ₹${Math.min(...pnl).toLocaleString('en-IN')}</div>
        <div style="color:var(--text3);font-size:10px;margin-top:3px">${beText}</div>
      </div>
    </div>
    <div style="font-size:10px;color:var(--text3);margin-top:5px">🟢 Green = profit zone · 🔴 Red = loss zone · Each bar = one strike</div>
  </div>`
}

  if (!f||!f.name) return ''
  const cardId = 'fut_' + Date.now()
  return `<div class="strategy-card" style="margin-bottom:0;border-color:#0891b2;border-width:1.5px">

// ══════════════════════════════════════════════════════════
// BUTTERFLY OPTION CHAIN — Professional NSE layout
// CALL side | STRIKE | PUT side
// ══════════════════════════════════════════════════════════
function renderButterflyChain(d, s, lotSize) {
  const lot = lotSize || 25
  const nearStrikes = d.nearStrikes || []
  const prevSnap    = (typeof prevSnaps !== 'undefined' ? (prevSnaps[d.sym] || {}) : (typeof prevOISnapshot !== 'undefined' ? prevOISnapshot : {}))
  const maxCeOI     = Math.max(...nearStrikes.map(r => r.ce?.openInterest||0), 1)
  const maxPeOI     = Math.max(...nearStrikes.map(r => r.pe?.openInterest||0), 1)
  const maxOI       = Math.max(maxCeOI, maxPeOI)

  // Compute pin strike (highest CE+PE combined OI)
  const pinStrike = nearStrikes.reduce((best, row) => {
    const total = (row.ce?.openInterest||0) + (row.pe?.openInterest||0)
    return total > ((best.ce?.openInterest||0)+(best.pe?.openInterest||0)) ? row : best
  }, nearStrikes[0])?.strike

  // Compute squeeze strikes (CE/PE wall OI dropping fast)
  const squeezeStrikes = new Set()
  nearStrikes.forEach(row => {
    const prev = prevSnap[row.strike] || {}
    const ceDiff = (row.ce?.openInterest||0) - (prev.ce || row.ce?.openInterest||0)
    const peDiff = (row.pe?.openInterest||0) - (prev.pe || row.pe?.openInterest||0)
    if (ceDiff < -20000 && row.strike === d.ceWall?.strike) squeezeStrikes.add(row.strike)
    if (peDiff < -20000 && row.strike === d.peWall?.strike) squeezeStrikes.add(row.strike)
  })

  // Top 3 insight cards
  const atm = d.atm || d.nearStrikes?.[Math.floor(nearStrikes.length/2)]?.strike
  const spotVsWall = Math.abs((d.spot||0) - (d.ceWall?.strike||0)) < 50
    ? `Spot only ${Math.abs((d.spot||0)-(d.ceWall?.strike||0))}pts from CE wall — AT DECISION POINT`
    : Math.abs((d.spot||0) - (d.peWall?.strike||0)) < 50
    ? `Spot only ${Math.abs((d.spot||0)-(d.peWall?.strike||0))}pts from PE wall — near support`
    : `Spot between walls — range trade zone`
  const squeezeCard = squeezeStrikes.size > 0
    ? `⚡ SQUEEZE at ₹${[...squeezeStrikes].join(',')} — wall OI dropping → explosive move coming`
    : `No active squeeze detected — walls holding`
  const pinCard = `₹${pinStrike} = highest combined OI — expiry will pin here. ${(pinStrike||0) > (d.spot||0) ? 'Pull UP' : 'Pull DOWN'} ${Math.abs((pinStrike||0)-(d.spot||0))}pts away`

  const topCards = `<div class="bfly-top">
    <div class="bfly-card">
      <div class="bfly-card-label">📍 Market Position</div>
      <div class="bfly-card-val">${spotVsWall}</div>
      <div class="bfly-card-sub">Spot ₹${(d.spot||0).toLocaleString('en-IN')} · ATM ₹${atm}</div>
    </div>
    <div class="bfly-card" style="border-color:${squeezeStrikes.size>0?'var(--yel-bd)':'var(--border)'}">
      <div class="bfly-card-label">⚡ Squeeze Watch</div>
      <div class="bfly-card-val" style="color:${squeezeStrikes.size>0?'var(--yellow)':'var(--text3)'}">${squeezeCard}</div>
      <div class="bfly-card-sub">CE wall ₹${d.ceWall?.strike} · PE wall ₹${d.peWall?.strike}</div>
    </div>
    <div class="bfly-card" style="border-color:var(--pur-bd)">
      <div class="bfly-card-label">🎯 Pin Risk (Max Pain)</div>
      <div class="bfly-card-val" style="color:var(--purple)">${pinCard}</div>
      <div class="bfly-card-sub">Max Pain ₹${d.maxPainStrike||d.maxPain||'—'} · DTE ${s?.dte||'—'}</div>
    </div>
  </div>`

  // Table rows
  const rows = nearStrikes.map(row => {
    const ceOI  = row.ce?.openInterest || 0
    const peOI  = row.pe?.openInterest || 0
    const ceLTP = row.ce?.lastPrice || 0
    const peLTP = row.pe?.lastPrice || 0
    const ceVol = row.ce?.totalTradedVolume || row.ce?.volume || 0
    const peVol = row.pe?.totalTradedVolume || row.pe?.volume || 0
    const ceIV  = row.ce?.impliedVolatility || 0
    const peIV  = row.pe?.impliedVolatility || 0
    const prev  = prevSnap[row.strike] || {}
    const ceDiff = ceOI - (prev.ce || ceOI)
    const peDiff = peOI - (prev.pe || peOI)
    const ceLTPPrev = prev.ceLTP || ceLTP
    const peLTPPrev = prev.peLTP || peLTP
    const ceLTPChg = ceLTP - ceLTPPrev
    const peLTPChg = peLTP - peLTPPrev

    // Approximate delta: ATM=0.5, each step away = -0.1
    const atmIdx = nearStrikes.findIndex(r => r.strike === atm)
    const rowIdx = nearStrikes.indexOf(row)
    const stepsFromATM = rowIdx - atmIdx
    const ceDelta = Math.max(0.02, Math.min(0.98, 0.5 - stepsFromATM * 0.12)).toFixed(2)
    const peDelta = Math.max(0.02, Math.min(0.98, 0.5 + stepsFromATM * 0.12)).toFixed(2)

    // OI bar widths (max 70px)
    const ceBarW = Math.round(ceOI / maxOI * 70)
    const peBarW = Math.round(peOI / maxOI * 70)

    // 4-way buildup signal
    function getBDup(oiDiff, ltpChg, isWall, wallOI) {
      const bigMove = Math.abs(oiDiff) > 20000
      if (!bigMove && !isWall) return {cls:'neutral', icon:'—', tip:'No significant change'}
      if (oiDiff < -20000 && ltpChg > 0) return {cls:'squeeze', icon:'⚡ SQUEEZE', tip:'OI dropping + price rising = short covering. EXPLOSIVE move possible.'}
      if (oiDiff < -20000 && ltpChg <= 0) return {cls:'unwind', icon:'📉 Unwind', tip:'OI dropping + price falling = long positions exiting. Trend weakening.'}
      if (oiDiff > 20000 && ltpChg > 0) return {cls:'long-build', icon:'🐂 Long Build', tip:'OI rising + price rising = fresh longs entering. Strong bull trend.'}
      if (oiDiff > 20000 && ltpChg <= 0) return {cls:'short-build', icon:'🐻 Short Build', tip:'OI rising + price falling = fresh shorts entering. Strong bear trend.'}
      return {cls:'neutral', icon:'—', tip:'Moderate activity'}
    }

    const ceBdup = getBDup(ceDiff, ceLTPChg, row.strike===d.ceWall?.strike, ceOI)
    const peBdup = getBDup(peDiff, peLTPChg, row.strike===d.peWall?.strike, peOI)

    // Row classification
    const isATM    = row.strike === atm
    const isCeWall = row.strike === d.ceWall?.strike
    const isPeWall = row.strike === d.peWall?.strike
    const isPin    = row.strike === pinStrike && !isATM
    const isSqueez = squeezeStrikes.has(row.strike)
    const rowCls   = isSqueez ? 'row-squeeze' : isCeWall ? 'row-cewall' : isPeWall ? 'row-pewall' : isPin ? 'row-pin' : isATM ? 'row-atm' : ''

    // Strike label
    const strikeBadge = isCeWall ? ' 🔴' : isPeWall ? ' 🟢' : isATM ? ' ◆' : isPin ? ' 📌' : ''

    // Hover tooltip data
    const ttData = JSON.stringify({
      strike: row.strike,
      ceLTP, peLTP, ceOI, peOI, ceIV, peIV,
      ceDiff, peDiff, ceLTPChg, peLTPChg, lot,
      isCeWall, isPeWall, isATM, isPin,
      ceValue: Math.round(ceLTP*lot), peValue: Math.round(peLTP*lot)
    }).replace(/"/g,'&quot;')

    return `<tr class="${rowCls}" onmouseenter="showBflyTT(event,'${ttData}')" onmouseleave="hideBflyTT()">
      <td class="ce-val"><span class="bdup ${ceBdup.cls}" title="${ceBdup.tip}">${ceBdup.icon}</span></td>
      <td class="ce-val"><span class="delta-num" style="color:var(--red)">${ceDelta}</span></td>
      <td class="ce-val"><span class="${ceDiff>0?'ltp-up':ceDiff<0?'ltp-dn':''}">${ceDiff>=0?'+':''}${(ceDiff/100000).toFixed(2)}L</span></td>
      <td class="ce-val">
        <div class="oi-bar-ce">
          <span class="oi-num ce">${(ceOI/100000).toFixed(1)}L</span>
          <div class="bar-fill-ce" style="width:${ceBarW}px"></div>
        </div>
      </td>
      <td class="ce-val">${ceVol>0?(ceVol/1000).toFixed(0)+'K':'—'}</td>
      <td class="ce-val"><strong style="color:var(--red)">${ceLTP>0?'₹'+ceLTP.toFixed(1):'—'}</strong></td>
      <td class="ce-val" style="font-size:10px;color:${ceLTPChg>0?'var(--green)':ceLTPChg<0?'var(--red)':'var(--text3)'}">${ceLTPChg>=0?'+':''}${ceLTPChg.toFixed(1)}</td>
      <td class="ce-val" style="font-size:10px">${ceIV>0?ceIV.toFixed(1)+'%':'—'}</td>

      <td class="strike-cell">
        <div style="display:flex;align-items:center;justify-content:center;gap:3px">
          ₹${row.strike.toLocaleString('en-IN')}${strikeBadge}
        </div>
        ${isATM?'<div style="font-size:8px;font-weight:800;color:var(--blue);text-align:center;margin-top:1px">ATM</div>':''}
      </td>

      <td class="pe-val" style="font-size:10px;color:${peIV>0?'var(--green)':'var(--text3)'}">${peIV>0?peIV.toFixed(1)+'%':'—'}</td>
      <td class="pe-val" style="font-size:10px;color:${peLTPChg>0?'var(--green)':peLTPChg<0?'var(--red)':'var(--text3)'}">${peLTPChg>=0?'+':''}${peLTPChg.toFixed(1)}</td>
      <td class="pe-val"><strong style="color:var(--green)">${peLTP>0?'₹'+peLTP.toFixed(1):'—'}</strong></td>
      <td class="pe-val">${peVol>0?(peVol/1000).toFixed(0)+'K':'—'}</td>
      <td class="pe-val">
        <div class="oi-bar-pe">
          <div class="bar-fill-pe" style="width:${peBarW}px"></div>
          <span class="oi-num pe">${(peOI/100000).toFixed(1)}L</span>
        </div>
      </td>
      <td class="pe-val"><span class="${peDiff>0?'ltp-up':peDiff<0?'ltp-dn':''}">${peDiff>=0?'+':''}${(peDiff/100000).toFixed(2)}L</span></td>
      <td class="pe-val"><span class="delta-num" style="color:var(--green)">${peDelta}</span></td>
      <td class="pe-val"><span class="bdup ${peBdup.cls}" title="${peBdup.tip}">${peBdup.icon}</span></td>
    </tr>`
  }).join('')

  return `<div class="bfly-wrap">
    ${topCards}
    <div style="overflow-x:auto">
    <table class="bfly-tbl">
      <thead>
        <tr>
          <th class="ce-col">Buildup</th>
          <th class="ce-col">Δ Delta</th>
          <th class="ce-col">Ch OI</th>
          <th class="ce-col" style="min-width:110px">OI ◀</th>
          <th class="ce-col">Volume</th>
          <th class="ce-col">LTP</th>
          <th class="ce-col">Ch LTP</th>
          <th class="ce-col">IV%</th>
          <th class="strike-col">STRIKE</th>
          <th class="pe-col">IV%</th>
          <th class="pe-col">Ch LTP</th>
          <th class="pe-col">LTP</th>
          <th class="pe-col">Volume</th>
          <th class="pe-col" style="min-width:110px">▶ OI</th>
          <th class="pe-col">Ch OI</th>
          <th class="pe-col">Δ Delta</th>
          <th class="pe-col">Buildup</th>
        </tr>
        <tr style="background:var(--bg2)">
          <th colspan="8" style="text-align:center;font-size:9px;color:var(--red);padding:3px;border-bottom:1px solid var(--red-bd);background:var(--red-bg)">◀ CALL (CE) — Bearish writers, Resistance</th>
          <th class="strike-col" style="font-size:9px;color:var(--text3);padding:3px">—</th>
          <th colspan="8" style="text-align:center;font-size:9px;color:var(--green);padding:3px;border-bottom:1px solid var(--green-bd);background:var(--green-bg)">PUT (PE) — Bullish writers, Support ▶</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
    <div style="padding:8px 12px;background:var(--bg3);border-top:1px solid var(--border);font-size:10px;color:var(--text3);display:flex;gap:16px;flex-wrap:wrap">
      <span>🔴 CE Wall border</span>
      <span>🟢 PE Wall border</span>
      <span>🟡 Squeeze glow = active</span>
      <span>📌 Pin strike = highest combined OI</span>
      <span>⚡ SQUEEZE = explosive move signal</span>
      <span>Hover any row for full plain English analysis</span>
    </div>
  </div>`
}

// Tooltip handlers
function showBflyTT(event, dataStr) {
  try {
    const d = JSON.parse(dataStr.replace(/&quot;/g,'"'))
    const el = document.getElementById('bflyTooltip')
    const title = document.getElementById('ttTitle')
    const body  = document.getElementById('ttBody')
    if (!el) return
    title.textContent = `₹${d.strike} — ${d.isATM?'ATM (At the Money)':d.isCeWall?'CE Wall (Resistance)':d.isPeWall?'PE Wall (Support)':d.isPin?'Pin Strike':'—'}`
    body.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px">
        <div>
          <div style="font-size:10px;font-weight:800;color:#fca5a5;margin-bottom:4px">🔴 CALL (CE) side</div>
          <div>LTP: <strong style="color:#fca5a5">₹${d.ceLTP?.toFixed(1)||'—'}</strong> (lot value ₹${d.ceValue?.toLocaleString('en-IN')||'—'})</div>
          <div>OI: ${((d.ceOI||0)/100000).toFixed(1)}L contracts</div>
          <div>IV: ${d.ceIV?.toFixed(1)||'—'}%</div>
          ${d.ceDiff?`<div>OI Change: <span style="color:${d.ceDiff>0?'#86efac':'#fca5a5'}">${d.ceDiff>=0?'+':''}${((d.ceDiff||0)/100000).toFixed(2)}L</span></div>`:''}
        </div>
        <div>
          <div style="font-size:10px;font-weight:800;color:#86efac;margin-bottom:4px">🟢 PUT (PE) side</div>
          <div>LTP: <strong style="color:#86efac">₹${d.peLTP?.toFixed(1)||'—'}</strong> (lot value ₹${d.peValue?.toLocaleString('en-IN')||'—'})</div>
          <div>OI: ${((d.peOI||0)/100000).toFixed(1)}L contracts</div>
          <div>IV: ${d.peIV?.toFixed(1)||'—'}%</div>
          ${d.peDiff?`<div>OI Change: <span style="color:${d.peDiff>0?'#86efac':'#fca5a5'}">${d.peDiff>=0?'+':''}${((d.peDiff||0)/100000).toFixed(2)}L</span></div>`:''}
        </div>
      </div>
      <div style="border-top:1px solid rgba(255,255,255,0.12);padding-top:7px;font-size:11px;color:rgba(255,255,255,0.75);line-height:1.7">
        ${d.isCeWall?`<strong style="color:#fca5a5">This is the CE Wall (Resistance).</strong> ${((d.ceOI||0)/100000).toFixed(1)}L contracts written here = institutions defending this ceiling. If spot crosses ₹${d.strike}, all these CE writers must buy back = explosive upward squeeze.`:
          d.isPeWall?`<strong style="color:#86efac">This is the PE Wall (Support).</strong> ${((d.peOI||0)/100000).toFixed(1)}L contracts written here = institutions defending this floor. If spot breaks below ₹${d.strike}, PE writers must buy back = explosive downward squeeze.`:
          d.isATM?`<strong style="color:#93c5fd">ATM Strike.</strong> CE premium ₹${d.ceLTP?.toFixed(1)} costs ₹${d.ceValue?.toLocaleString()} per lot. PE premium ₹${d.peLTP?.toFixed(1)} costs ₹${d.peValue?.toLocaleString()} per lot. Highest gamma here = biggest daily move for options.`:
          d.isPin?`<strong style="color:#fde68a">Pin Strike.</strong> Highest combined OI. Near expiry, market gravitates here like a magnet. Option writers defend this strike to maximize their profit.`:
          `Regular strike. CE premium ₹${d.ceLTP?.toFixed(1)}, PE premium ₹${d.peLTP?.toFixed(1)}.`}
      </div>`
    // Position tooltip near cursor but avoid edges
    const x = Math.min(event.clientX + 15, window.innerWidth - 310)
    const y = Math.min(event.clientY - 10, window.innerHeight - 250)
    el.style.left = x + 'px'
    el.style.top  = y + 'px'
    el.classList.add('show')
  } catch(e) {}
}

  const el = document.getElementById('bflyTooltip')
  if (el) el.classList.remove('show')
}
